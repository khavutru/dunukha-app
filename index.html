<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dunukha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background: #fafafa; display: flex; justify-content: center; height: 100vh; }
    #app { max-width: 500px; width: 100%; background: #fff; min-height: 100vh; display: none; flex-direction: column; position: relative; }
    
    /* LOGIN SCREEN MỚI - ĐẸP HƠN */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: #fff; padding: 20px; }
    .login-box { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 40px 25px; border-radius: 30px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    
    /* LOGO ĐẸP - Chữ D cách điệu */
    .logo-container { display: flex; justify-content: center; margin-bottom: 30px; }
    .logo-d { font-size: 80px; font-weight: 900; background: linear-gradient(45deg, #fff 30%, #ffdd00 70%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 4px 10px rgba(0,0,0,0.3); font-family: 'Arial Black', sans-serif; letter-spacing: -4px; }
    .logo-sub { color: rgba(255,255,255,0.8); font-size: 14px; letter-spacing: 3px; margin-top: -15px; text-transform: uppercase; }
    
    .login-box input { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 12px; background: rgba(255,255,255,0.9); font-size: 15px; outline: none; transition: 0.3s; }
    .login-box input:focus { box-shadow: 0 0 0 3px rgba(255,255,255,0.5); }
    .login-btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 30px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .login-btn.google { background: white; color: #333; }
    .login-btn.facebook { background: #1877f2; color: white; }
    .login-btn:active { transform: scale(0.96); }
    .login-divider { color: rgba(255,255,255,0.7); margin: 15px 0; font-size: 13px; display: flex; align-items: center; gap: 10px; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.3); }
    
    /* Header & Nav */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #dbdbdb; background: #fff; position: sticky; top: 0; z-index: 20; }
    .logo-small { font-size: 22px; font-weight: 700; background: linear-gradient(45deg, #f09433, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-icons { display: flex; gap: 18px; font-size: 22px; color: #262626; }
    .badge { position: relative; }
    .badge::after { content: attr(data-count); position: absolute; top: -5px; right: -8px; background: #ed4956; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; display: none; }
    .badge[data-count]:not([data-count="0"])::after { display: block; }
    
    .bottom-nav { display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #dbdbdb; background: #fff; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; z-index: 10; }
    .bottom-nav i { font-size: 24px; color: #262626; cursor: pointer; padding: 5px; transition: 0.2s; }
    .bottom-nav i.active { color: #0095f6; }
    .bottom-nav i:active { transform: scale(0.9); }

    .page { display: none; flex: 1; overflow-y: auto; padding-bottom: 60px; background: #fafafa; }
    .page.active { display: block; }

    /* Stories */
    .stories { display: flex; gap: 12px; padding: 12px 15px; border-bottom: 1px solid #dbdbdb; overflow-x: auto; background: #fff; }
    .story-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; }
    .story-ring { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #bc1888); padding: 2px; }
    .story-ring img, .story-ring video { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; object-fit: cover; }
    .story-item span { font-size: 11px; color: #262626; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Post */
    .post { background: #fff; border: 1px solid #dbdbdb; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    .post-header { display: flex; align-items: center; gap: 10px; padding: 12px 15px; cursor: pointer; }
    .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .post-header .username { font-weight: 600; font-size: 14px; }
    .post-media { width: 100%; max-height: 500px; object-fit: contain; background: black; }
    .post-actions { padding: 10px 15px 5px; display: flex; gap: 15px; }
    .post-actions i { font-size: 24px; cursor: pointer; transition: 0.15s; }
    .post-actions i:active { transform: scale(1.2); }
    .post-actions i.liked { color: #ed4956; }
    .post-likes { padding: 0 15px 5px; font-weight: 600; font-size: 14px; }
    .post-caption { padding: 0 15px 10px; font-size: 14px; }
    .post-caption .username { font-weight: 600; margin-right: 5px; }
    .post-comment-input { display: flex; border-top: 1px solid #efefef; padding: 10px 15px; }
    .post-comment-input input { flex: 1; border: none; outline: none; font-size: 14px; }
    .post-comment-input button { background: none; border: none; color: #0095f6; font-weight: 600; cursor: pointer; }

    /* Reels */
    .reel-item { position: relative; width: 100%; height: 100vh; scroll-snap-align: start; background: black; display: flex; align-items: center; justify-content: center; }
    .reel-item video { width: 100%; height: 100%; object-fit: contain; }
    .reel-info { position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.7); }

    /* Profile */
    .profile-header { display: flex; align-items: center; gap: 20px; padding: 20px; border-bottom: 1px solid #dbdbdb; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #0095f6; }
    .profile-info { flex: 1; }
    .profile-stats { display: flex; gap: 20px; margin: 10px 0; }
    .profile-stats div { text-align: center; }
    .profile-stats span { font-weight: 600; display: block; }
    .profile-bio { margin: 5px 0; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
    .profile-grid img, .profile-grid video { aspect-ratio: 1/1; object-fit: cover; width: 100%; cursor: pointer; }

    /* Buttons */
    .btn { padding: 6px 16px; border-radius: 8px; border: 1px solid #dbdbdb; background: #fafafa; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: #0095f6; color: white; border: none; }
    .btn-primary:active { opacity: 0.7; }

    /* Modals */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 30; }
    .modal-content { background: #fff; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; max-height: 80%; overflow-y: auto; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 8px; }
    .modal-content button { background: #0095f6; color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; margin-top: 10px; cursor: pointer; }

    /* Sidebar */
    .side-menu { position: fixed; top: 0; left: 0; width: 75%; max-width: 300px; height: 100%; background: #fff; z-index: 40; box-shadow: 2px 0 15px rgba(0,0,0,0.2); transform: translateX(-100%); transition: 0.3s; padding: 20px; display: flex; flex-direction: column; }
    .side-menu.open { transform: translateX(0); }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 35; }
    .overlay.show { display: block; }

    /* Chat */
    .message-row { display: flex; margin: 6px 0; }
    .message-row.sent { justify-content: flex-end; }
    .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 20px; font-size: 15px; word-break: break-word; }
    .sent .message-bubble { background: #0095f6; color: white; }
    .received .message-bubble { background: #efefef; }

    /* Toast */
    .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 999; background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="toast" class="toast"></div>
  <div id="login-screen">
    <div class="login-box">
      <div class="logo-container">
        <div class="logo-d">D</div>
      </div>
      <div class="logo-sub">Dunukha</div>
      <p style="color:rgba(255,255,255,0.8); margin-bottom:20px; font-size:14px;">Kết nối với bạn bè và thế giới</p>
      <button class="login-btn google" id="google-login"><i class="fab fa-google"></i> Đăng nhập với Google</button>
      <button class="login-btn facebook" id="facebook-login"><i class="fab fa-facebook"></i> Đăng nhập với Facebook</button>
      <div class="login-divider">hoặc</div>
      <p style="color:rgba(255,255,255,0.5); font-size:12px;">Bằng cách đăng nhập, bạn đồng ý với Điều khoản và Chính sách của chúng tôi.</p>
    </div>
  </div>

  <div id="app">
    <!-- Header -->
    <div class="header">
      <i class="fas fa-bars" id="menu-btn" style="font-size:22px; cursor:pointer;"></i>
      <div class="logo-small">Dunukha</div>
      <div class="header-icons">
        <i class="far fa-heart badge" id="btn-notif" data-count="0"></i>
        <i class="far fa-paper-plane" id="btn-chat"></i>
      </div>
    </div>

    <!-- Các trang -->
    <div class="page active" id="page-home">
      <div class="stories" id="stories-container"></div>
      <div id="feed-container"></div>
      <div class="loader" id="feed-loader" style="display:none;">Đang tải thêm...</div>
    </div>
    <div class="page" id="page-explore">
      <div style="padding:15px;"><input type="text" id="search-input" placeholder="Tìm kiếm người dùng..." style="width:100%; padding:10px; border-radius:10px; border:1px solid #dbdbdb; margin-bottom:10px;"></div>
      <div id="explore-grid" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:3px; padding:0 5px;"></div>
    </div>
    <div class="page" id="page-reels">
      <div id="reels-container" style="height:100vh; overflow-y:scroll; scroll-snap-type: y mandatory;"></div>
    </div>
    <div class="page" id="page-post">
      <div style="padding:20px;">
        <label style="display:block;margin-bottom:5px;font-weight:600;">Chọn ảnh/video</label>
        <input type="file" id="post-files" accept="image/*,video/*" multiple>
        <div id="preview-container" style="display:flex; flex-wrap:wrap; gap:5px; margin:10px 0;"></div>
        <textarea id="post-caption" placeholder="Viết caption..." style="width:100%; padding:10px; border:1px solid #dbdbdb; border-radius:8px;"></textarea>
        <input type="text" id="post-hashtags" placeholder="#hashtags cách nhau dấu cách" style="width:100%; padding:10px; border:1px solid #dbdbdb; border-radius:8px; margin:8px 0;">
        <button id="btn-submit-post" style="width:100%; background:#0095f6; color:white; border:none; padding:12px; border-radius:8px; font-weight:600; cursor:pointer;">Đăng</button>
      </div>
    </div>
    <div class="page" id="page-profile">
      <div id="profile-content"></div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <i class="fas fa-home active" data-page="home"></i>
      <i class="fas fa-search" data-page="explore"></i>
      <i class="fas fa-video" data-page="reels"></i>
      <i class="far fa-plus-square" data-page="post"></i>
      <i class="far fa-user-circle" data-page="profile"></i>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="overlay" id="menu-overlay"></div>
  <div class="side-menu" id="side-menu">
    <i class="fas fa-times" id="close-menu" style="align-self:flex-end; font-size:24px; cursor:pointer;"></i>
    <div class="menu-item" data-action="profile" style="padding:12px 0; cursor:pointer;">Trang cá nhân</div>
    <div class="menu-item" data-action="edit-profile" style="padding:12px 0; cursor:pointer;">Chỉnh sửa hồ sơ</div>
    <div class="menu-item" data-action="saved" style="padding:12px 0; cursor:pointer;">Đã lưu</div>
    <div class="menu-item" data-action="logout" style="padding:12px 0; cursor:pointer;">Đăng xuất</div>
  </div>

  <!-- Modal Story -->
  <div class="modal" id="story-modal">
    <div class="modal-content" style="background:black; color:white; text-align:center; width:100%; max-width:500px; height:80%;">
      <img id="story-img" style="width:100%; height:100%; object-fit:contain; display:none;">
      <video id="story-video" style="width:100%; height:100%; object-fit:contain; display:none;" controls autoplay></video>
      <button id="btn-close-story" style="position:absolute; top:10px; right:10px; background:white; color:black; border:none; border-radius:50%; width:35px; height:35px; font-weight:bold;">X</button>
    </div>
  </div>

  <!-- Modal Chat -->
  <div class="modal" id="chat-modal">
    <div class="modal-content" style="height:90%; display:flex; flex-direction:column; max-width:500px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="chat-username">Chat</h3>
        <button id="btn-back-chat" style="background:none; border:none; color:#0095f6; font-size:16px;">Quay lại</button>
      </div>
      <div id="chat-list" style="flex:1; overflow-y:auto;"></div>
      <div id="chat-window" style="display:none; flex:1; flex-direction:column;">
        <div id="chat-messages" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #dbdbdb; gap:5px;">
          <input type="text" id="chat-input" placeholder="Nhắn tin..." style="flex:1; border:1px solid #dbdbdb; border-radius:20px; padding:8px 15px;">
          <button id="btn-send-msg" style="background:#0095f6; color:white; border:none; border-radius:50%; width:36px; height:36px;"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Edit Profile -->
  <div class="modal" id="edit-modal">
    <div class="modal-content">
      <h3>Chỉnh sửa hồ sơ</h3>
      <input type="text" id="edit-username" placeholder="Username">
      <input type="text" id="edit-displayname" placeholder="Tên hiển thị">
      <textarea id="edit-bio" placeholder="Bio"></textarea>
      <input type="url" id="edit-website" placeholder="Website">
      <label>Avatar mới:</label>
      <input type="file" id="edit-avatar-file" accept="image/*">
      <button id="btn-save-edit">Lưu</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where, getDocs, setDoc, getDoc, limit, startAfter, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJ3DAWyschGA6fM5VmBndLI0cGSaFF46U",
      authDomain: "dunukhasite.firebaseapp.com",
      projectId: "dunukhasite",
      storageBucket: "dunukhasite.firebasestorage.app",
      messagingSenderId: "841226738327",
      appId: "1:841226738327:web:5e0192799adbe1179067d2"
    };
    const IMGBB_API_KEY = "d4802501f212046a8d74561bbdaf6dd3";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    const facebookProvider = new FacebookAuthProvider();

    let currentUser = null;
    let currentChatUser = null;
    let unsubscribes = {};
    let allUsersCache = null;
    let lastPostDoc = null;
    let isLoadingPosts = false;

    // ---------- TOAST ----------
    function showToast(msg, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._hideTimer);
      toast._hideTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    // ---------- AUTH ----------
    document.getElementById('google-login').onclick = () => signInWithPopup(auth, googleProvider).catch(e => showToast('Lỗi đăng nhập: ' + e.message));
    document.getElementById('facebook-login').onclick = () => signInWithPopup(auth, facebookProvider).catch(e => showToast('Lỗi đăng nhập: ' + e.message));

    onAuthStateChanged(auth, async user => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        await ensureUserDoc(user);
        navigateTo('home');
        listenNotifications();
        showToast('Đăng nhập thành công!');
      } else {
        currentUser = null;
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        Object.values(unsubscribes).forEach(u => u());
        unsubscribes = {};
      }
    });

    async function ensureUserDoc(user) {
      const ref = doc(db, "users", user.uid);
      if (!(await getDoc(ref)).exists()) {
        await setDoc(ref, {
          displayName: user.displayName || "Người dùng",
          email: user.email,
          photoURL: user.photoURL || "https://via.placeholder.com/150",
          username: user.email.split('@')[0],
          bio: "",
          website: "",
          followers: {},
          following: {},
          saved: [],
          blocked: {},
          isPrivate: false,
          createdAt: serverTimestamp()
        });
      }
    }

    // ---------- IMGBB ----------
    async function uploadImgBB(file) {
      const fd = new FormData();
      fd.append('image', file);
      try {
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.error?.message || 'Upload lỗi');
        return data.data.url;
      } catch (e) {
        console.error('ImgBB upload error:', e);
        throw new Error('Không thể tải lên ảnh. Vui lòng kiểm tra kết nối hoặc thử lại.');
      }
    }

    // ---------- NAVIGATION ----------
    const pages = {
      home: document.getElementById('page-home'),
      explore: document.getElementById('page-explore'),
      reels: document.getElementById('page-reels'),
      post: document.getElementById('page-post'),
      profile: document.getElementById('page-profile')
    };
    document.querySelectorAll('.bottom-nav i').forEach(icon => {
      icon.addEventListener('click', () => navigateTo(icon.dataset.page));
    });

    function navigateTo(page) {
      document.querySelectorAll('.bottom-nav i').forEach(i => i.classList.remove('active'));
      document.querySelector(`[data-page="${page}"]`).classList.add('active');
      Object.values(pages).forEach(p => p.classList.remove('active'));
      pages[page].classList.add('active');

      if (page === 'home') { loadStories(); loadFeed(); }
      else if (page === 'explore') loadExplore();
      else if (page === 'reels') loadReels();
      else if (page === 'profile') loadProfile(currentUser.uid);
    }

    // ---------- STORIES ----------
    async function loadStories() {
      const container = document.getElementById('stories-container');
      container.innerHTML = '';
      try {
        const now = new Date();
        const snap = await getDocs(query(collection(db, "stories"), orderBy("expiresAt", "desc")));
        const users = {};
        snap.forEach(doc => {
          const d = doc.data();
          if (d.expiresAt.toDate() > now) {
            if (!users[d.uid]) users[d.uid] = { ...d, stories: [] };
            users[d.uid].stories.push(d);
          }
        });
        for (const uid in users) {
          const u = users[uid];
          const userDoc = await getDoc(doc(db, "users", uid));
          if (!userDoc.exists()) continue;
          const userData = userDoc.data();
          const div = document.createElement('div');
          div.className = 'story-item';
          const thumb = u.stories[0].mediaType === 'video' ?
            `<video src="${u.stories[0].mediaUrl}" muted autoplay loop></video>` :
            `<img src="${u.stories[0].mediaUrl}">`;
          div.innerHTML = `<div class="story-ring">${thumb}</div><span>${userData.displayName}</span>`;
          div.onclick = () => viewStory(u.stories);
          container.appendChild(div);
        }
      } catch (e) { console.error('Lỗi tải stories:', e); }
      const myDiv = document.createElement('div');
      myDiv.className = 'story-item';
      myDiv.innerHTML = `<div class="story-ring" style="background:#ddd; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus" style="color:#0095f6;"></i></div><span>Bạn</span>`;
      myDiv.onclick = () => navigateTo('post');
      container.appendChild(myDiv);
    }

    function viewStory(stories) {
      let index = 0;
      const modal = document.getElementById('story-modal');
      modal.style.display = 'flex';
      const img = document.getElementById('story-img');
      const video = document.getElementById('story-video');
      const show = () => {
        const s = stories[index];
        if (s.mediaType === 'video') {
          video.src = s.mediaUrl; video.style.display = 'block'; video.play();
          img.style.display = 'none';
        } else {
          img.src = s.mediaUrl; img.style.display = 'block';
          video.style.display = 'none';
        }
      };
      show();
      const timer = setInterval(() => {
        index++;
        if (index >= stories.length) { clearInterval(timer); modal.style.display = 'none'; }
        else show();
      }, 5000);
      document.getElementById('btn-close-story').onclick = () => { clearInterval(timer); modal.style.display = 'none'; };
    }

    // ---------- FEED ----------
    function loadFeed() {
      document.getElementById('feed-container').innerHTML = '';
      lastPostDoc = null;
      fetchPosts();
    }

    async function fetchPosts() {
      if (isLoadingPosts) return;
      isLoadingPosts = true;
      document.getElementById('feed-loader').style.display = 'block';
      try {
        const q = lastPostDoc ?
          query(collection(db, "posts"), orderBy("createdAt", "desc"), startAfter(lastPostDoc), limit(5)) :
          query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(5));
        const snap = await getDocs(q);
        if (!snap.empty) {
          snap.forEach(doc => { renderPost(doc.data(), doc.id); lastPostDoc = doc; });
        } else {
          if (!lastPostDoc) document.getElementById('feed-container').innerHTML = '<div style="text-align:center;padding:20px;color:#8e8e8e;">Chưa có bài viết nào. Hãy là người đầu tiên!</div>';
          else document.getElementById('feed-loader').textContent = 'Đã hết bài viết';
        }
      } catch (e) {
        console.error('Lỗi tải feed:', e);
        showToast('Lỗi tải bài viết');
      }
      isLoadingPosts = false;
      document.getElementById('feed-loader').style.display = 'none';
    }

    document.getElementById('page-home').addEventListener('scroll', function() {
      if (this.scrollHeight - this.scrollTop - this.clientHeight < 100 && !isLoadingPosts) fetchPosts();
    });

    function renderPost(post, id) {
      const liked = post.likes?.includes(currentUser.uid);
      const isOwner = post.uid === currentUser.uid;
      const div = document.createElement('div');
      div.className = 'post';
      const media = post.mediaUrls?.map(url =>
        url.match(/\.(mp4|webm|ogg)$/i) ? `<video class="post-media" src="${url}" controls preload="metadata"></video>` : `<img class="post-media" src="${url}" loading="lazy">`
      ).join('') || `<img class="post-media" src="${post.mediaUrl || 'https://via.placeholder.com/400'}">`;
      div.innerHTML = `
        <div class="post-header" data-uid="${post.uid}">
          <img src="${post.userAvatar || 'https://via.placeholder.com/32'}">
          <span class="username">${post.username}</span>
          ${isOwner ? '<i class="fas fa-trash" style="margin-left:auto; color:#ed4956; cursor:pointer;" data-id="'+id+'"></i>' : ''}
        </div>
        <div>${media}</div>
        <div class="post-actions">
          <i class="${liked ? 'fas fa-heart liked' : 'far fa-heart'}" data-id="${id}"></i>
          <i class="far fa-comment"></i>
          <i class="far fa-paper-plane share-btn" data-id="${id}"></i>
          <i class="far fa-bookmark save-btn" data-id="${id}"></i>
        </div>
        <div class="post-likes">${post.likes?.length || 0} thích</div>
        <div class="post-caption"><span class="username">${post.username}</span> ${post.caption || ''} ${post.hashtags?.map(t=>'#'+t).join(' ')||''}</div>
        <div class="post-comment-input">
          <input placeholder="Bình luận..." id="comment-${id}">
          <button class="send-comment" data-id="${id}">Đăng</button>
        </div>
      `;
      document.getElementById('feed-container').appendChild(div);

      if (isOwner) {
        div.querySelector('.fa-trash').onclick = async () => {
          if (confirm('Bạn có chắc muốn xóa bài viết này?')) {
            await deleteDoc(doc(db, "posts", id));
            div.remove();
            showToast('Đã xóa bài viết');
          }
        };
      }

      div.querySelector('.post-header').onclick = () => loadProfile(post.uid);
      div.querySelector('[data-id]').onclick = async (e) => {
        if (e.target.classList.contains('fa-heart')) {
          const ref = doc(db, "posts", id);
          if (liked) await updateDoc(ref, { likes: arrayRemove(currentUser.uid) });
          else {
            await updateDoc(ref, { likes: arrayUnion(currentUser.uid) });
            if (post.uid !== currentUser.uid) addNotification(post.uid, 'like', `${currentUser.displayName} đã thích bài của bạn`);
          }
        }
      };
      div.querySelector('.send-comment').onclick = async () => {
        const input = document.getElementById(`comment-${id}`);
        const text = input.value.trim();
        if (!text) return;
        await updateDoc(doc(db, "posts", id), { comments: arrayUnion({ uid: currentUser.uid, username: currentUser.displayName, text, createdAt: new Date().toISOString() }) });
        if (post.uid !== currentUser.uid) addNotification(post.uid, 'comment', `${currentUser.displayName}: ${text}`);
        input.value = '';
        showToast('Đã bình luận');
      };
      div.querySelector('.save-btn').onclick = async () => {
        const userRef = doc(db, "users", currentUser.uid);
        const snap = await getDoc(userRef);
        const saved = snap.data().saved || [];
        if (saved.includes(id)) {
          await updateDoc(userRef, { saved: arrayRemove(id) });
          showToast('Đã bỏ lưu');
        } else {
          await updateDoc(userRef, { saved: arrayUnion(id) });
          showToast('Đã lưu bài viết');
        }
      };
      div.querySelector('.share-btn').onclick = () => {
        const url = post.mediaUrls?.[0] || post.mediaUrl;
        if (navigator.share) navigator.share({ title: 'Dunukha', text: post.caption, url });
        else prompt("Copy link:", url);
      };
    }

    // ---------- POST ----------
    document.getElementById('post-files').onchange = function() {
      const preview = document.getElementById('preview-container');
      preview.innerHTML = '';
      for (const file of this.files) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const el = file.type.startsWith('video') ? document.createElement('video') : document.createElement('img');
          el.src = e.target.result;
          el.style.width = '100px'; el.style.height = '100px'; el.style.objectFit = 'cover';
          preview.appendChild(el);
        };
        reader.readAsDataURL(file);
      }
    };

    document.getElementById('btn-submit-post').onclick = async () => {
      const files = document.getElementById('post-files').files;
      const caption = document.getElementById('post-caption').value.trim();
      const hashtags = document.getElementById('post-hashtags').value.split(' ').filter(t => t.startsWith('#')).map(t => t.slice(1));
      if (!files.length) return showToast("Vui lòng chọn ảnh/video");
      document.getElementById('btn-submit-post').disabled = true;
      document.getElementById('btn-submit-post').textContent = 'Đang đăng...';
      try {
        const urls = [];
        for (const file of files) {
          const url = await uploadImgBB(file);
          urls.push(url);
        }
        const userData = (await getDoc(doc(db, "users", currentUser.uid))).data();
        await addDoc(collection(db, "posts"), {
          uid: currentUser.uid,
          username: userData.displayName,
          userAvatar: userData.photoURL,
          mediaUrls: urls,
          mediaType: files[0].type.startsWith('video') ? 'video' : 'image',
          caption, hashtags,
          likes: [], comments: [],
          createdAt: serverTimestamp()
        });
        document.getElementById('post-files').value = '';
        document.getElementById('preview-container').innerHTML = '';
        document.getElementById('post-caption').value = '';
        document.getElementById('post-hashtags').value = '';
        showToast("Đã đăng bài!");
        navigateTo('home');
      } catch (e) {
        showToast('Lỗi đăng bài: ' + e.message);
      } finally {
        document.getElementById('btn-submit-post').disabled = false;
        document.getElementById('btn-submit-post').textContent = 'Đăng';
      }
    };

    // ---------- REELS ----------
    async function loadReels() {
      const container = document.getElementById('reels-container');
      container.innerHTML = '';
      try {
        const snap = await getDocs(query(collection(db, "posts"), where("mediaType", "==", "video"), orderBy("createdAt", "desc"), limit(10)));
        snap.forEach(doc => {
          const d = doc.data();
          const div = document.createElement('div');
          div.className = 'reel-item';
          div.innerHTML = `<video src="${d.mediaUrls[0]}" controls preload="metadata"></video><div class="reel-info">${d.username}: ${d.caption}</div>`;
          container.appendChild(div);
        });
      } catch (e) { console.error('Lỗi tải reels:', e); }
    }

    // ---------- EXPLORE ----------
    async function loadExplore() {
      const grid = document.getElementById('explore-grid');
      grid.innerHTML = '';
      try {
        const snap = await getDocs(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(12)));
        snap.forEach(doc => {
          const p = doc.data();
          const el = document.createElement('img');
          el.src = p.mediaUrls?.[0] || p.mediaUrl;
          el.style.width = '100%'; el.style.aspectRatio = '1/1'; el.style.objectFit = 'cover';
          el.onclick = () => loadProfile(p.uid);
          grid.appendChild(el);
        });
      } catch (e) { console.error('Lỗi tải explore:', e); }
      document.getElementById('search-input').value = '';
    }

    // ---------- SEARCH ----------
    document.getElementById('search-input').addEventListener('input', async (e) => {
      const kw = e.target.value.trim().toLowerCase();
      const grid = document.getElementById('explore-grid');
      if (kw) {
        if (!allUsersCache) {
          const snap = await getDocs(collection(db, "users"));
          allUsersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        }
        const filtered = allUsersCache.filter(u => 
          u.displayName?.toLowerCase().includes(kw) || 
          u.username?.toLowerCase().includes(kw)
        );
        grid.innerHTML = '';
        filtered.forEach(u => {
          const div = document.createElement('div');
          div.style.cssText = 'display:flex; align-items:center; gap:10px; padding:10px; cursor:pointer; border-bottom:1px solid #efefef;';
          div.innerHTML = `
            <img src="${u.photoURL || 'https://via.placeholder.com/44'}" style="width:44px;height:44px;border-radius:50%;">
            <div>
              <div style="font-weight:600;">${u.displayName}</div>
              <div style="color:#888; font-size:12px;">@${u.username}</div>
            </div>
          `;
          div.onclick = () => loadProfile(u.id);
          grid.appendChild(div);
        });
      } else {
        loadExplore();
      }
    });

    // ---------- PROFILE ----------
    async function loadProfile(uid) {
      const container = document.getElementById('profile-content');
      container.innerHTML = 'Đang tải...';
      const ref = doc(db, "users", uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) { container.innerHTML = 'Người dùng không tồn tại'; return; }
      const data = snap.data();
      const isMe = uid === currentUser.uid;
      const isFollowing = data.followers?.[currentUser.uid];
      const isPrivate = data.isPrivate === true;
      if (data.blocked?.[currentUser.uid]) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">Bạn đã bị chặn bởi người dùng này</div>';
        return;
      }
      const canViewPosts = isMe || !isPrivate || isFollowing;
      container.innerHTML = `
        <div class="profile-header">
          <img class="profile-avatar" src="${data.photoURL || 'https://via.placeholder.com/150'}">
          <div class="profile-info">
            <h2>${data.displayName}</h2>
            <p>@${data.username}</p>
            <div class="profile-stats">
              <div><span>${Object.keys(data.followers||{}).length}</span> followers</div>
              <div><span>${Object.keys(data.following||{}).length}</span> following</div>
              <div><span>${(data.saved||[]).length}</span> đã lưu</div>
            </div>
            <p>${data.bio || ''}</p>
            ${data.website ? `<a href="${data.website}" target="_blank">${data.website}</a>` : ''}
            ${isPrivate ? '<span style="background:#ddd; padding:2px 10px; border-radius:10px; font-size:11px; margin-left:5px;">🔒 Riêng tư</span>' : ''}
            <div style="margin-top:10px;">
              ${isMe ? `
                <button class="btn" id="edit-profile-btn">Chỉnh sửa</button>
                <button class="btn" id="privacy-toggle-btn">${isPrivate ? 'Chuyển sang Công khai' : 'Chuyển sang Riêng tư'}</button>
              ` : `
                <button class="btn btn-primary" id="follow-btn">${isFollowing ? 'Bỏ theo dõi' : 'Theo dõi'}</button>
                <button class="btn" id="block-btn" style="background:#ed4956; color:white;">Chặn</button>
                <button class="btn" id="report-btn">Báo cáo</button>
              `}
            </div>
          </div>
        </div>
        <div class="profile-grid" id="profile-grid"></div>
      `;
      const grid = document.getElementById('profile-grid');
      if (canViewPosts) {
        try {
          const postsQ = query(collection(db, "posts"), where("uid", "==", uid), orderBy("createdAt", "desc"), limit(12));
          const postsSnap = await getDocs(postsQ);
          grid.innerHTML = '';
          postsSnap.forEach(doc => {
            const d = doc.data();
            const el = d.mediaType === 'video' ? document.createElement('video') : document.createElement('img');
            el.src = d.mediaUrls?.[0] || d.mediaUrl;
            el.style.width = '100%'; el.style.aspectRatio = '1/1'; el.style.objectFit = 'cover';
            el.style.cursor = 'pointer';
            el.onclick = () => alert(`📷 ${d.caption || 'Không có caption'}`);
            grid.appendChild(el);
          });
          if (grid.innerHTML === '') {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#8e8e8e; padding:20px;">Chưa có bài viết nào</div>';
          }
        } catch (e) { console.error('Lỗi tải profile posts:', e); }
      } else {
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#8e8e8e; padding:40px;">🔒 Tài khoản riêng tư<br>Hãy theo dõi để xem bài viết</div>';
      }
      if (isMe) {
        document.getElementById('edit-profile-btn').onclick = openEditProfile;
        document.getElementById('privacy-toggle-btn').onclick = async () => {
          const newPrivacy = !isPrivate;
          await updateDoc(doc(db, "users", currentUser.uid), { isPrivate: newPrivacy });
          showToast(`Đã chuyển sang ${newPrivacy ? 'Riêng tư' : 'Công khai'}`);
          loadProfile(currentUser.uid);
        };
      } else {
        document.getElementById('follow-btn').onclick = async () => {
          if (isFollowing) {
            await updateDoc(doc(db, "users", uid), { [`followers.${currentUser.uid}`]: false });
            await updateDoc(doc(db, "users", currentUser.uid), { [`following.${uid}`]: false });
            showToast('Đã bỏ theo dõi');
          } else {
            await updateDoc(doc(db, "users", uid), { [`followers.${currentUser.uid}`]: true });
            await updateDoc(doc(db, "users", currentUser.uid), { [`following.${uid}`]: true });
            addNotification(uid, 'follow', `${currentUser.displayName} theo dõi bạn`);
            showToast('Đã theo dõi');
          }
          loadProfile(uid);
        };
        document.getElementById('block-btn').onclick = async () => {
          if (!confirm('Chặn người này?')) return;
          await updateDoc(doc(db, "users", currentUser.uid), { [`blocked.${uid}`]: true });
          if (isFollowing) {
            await updateDoc(doc(db, "users", uid), { [`followers.${currentUser.uid}`]: false });
            await updateDoc(doc(db, "users", currentUser.uid), { [`following.${uid}`]: false });
          }
          showToast('Đã chặn');
          loadProfile(uid);
        };
        document.getElementById('report-btn').onclick = async () => {
          const reason = prompt('Lý do báo cáo:');
          if (!reason) return;
          await addDoc(collection(db, "reports"), { reporter: currentUser.uid, target: uid, reason, createdAt: serverTimestamp() });
          showToast('Đã gửi báo cáo');
        };
      }
    }

    function openEditProfile() {
      document.getElementById('edit-modal').style.display = 'flex';
      getDoc(doc(db, "users", currentUser.uid)).then(snap => {
        const d = snap.data();
        document.getElementById('edit-username').value = d.username || '';
        document.getElementById('edit-displayname').value = d.displayName || '';
        document.getElementById('edit-bio').value = d.bio || '';
        document.getElementById('edit-website').value = d.website || '';
      });
    }

    document.getElementById('btn-save-edit').onclick = async () => {
      const updates = {
        username: document.getElementById('edit-username').value.trim(),
        displayName: document.getElementById('edit-displayname').value.trim(),
        bio: document.getElementById('edit-bio').value.trim(),
        website: document.getElementById('edit-website').value.trim()
      };
      const file = document.getElementById('edit-avatar-file').files[0];
      if (file) {
        try {
          updates.photoURL = await uploadImgBB(file);
        } catch (e) { return showToast('Lỗi upload avatar: ' + e.message); }
      }
      await updateDoc(doc(db, "users", currentUser.uid), updates);
      document.getElementById('edit-modal').style.display = 'none';
      loadProfile(currentUser.uid);
      showToast('Đã cập nhật hồ sơ');
    };

    // ---------- CHAT ----------
    document.getElementById('btn-chat').onclick = () => { document.getElementById('chat-modal').style.display = 'flex'; loadChatList(); };

    async function loadChatList() {
      document.getElementById('chat-list').style.display = 'block';
      document.getElementById('chat-window').style.display = 'none';
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      const following = snap.data()?.following || {};
      const list = document.getElementById('chat-list');
      list.innerHTML = '';
      for (const uid in following) {
        if (!following[uid]) continue;
        const u = await getDoc(doc(db, "users", uid));
        if (!u.exists()) continue;
        const d = u.data();
        const div = document.createElement('div');
        div.style.cssText = 'display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid #efefef; cursor:pointer;';
        div.innerHTML = `<img src="${d.photoURL || 'https://via.placeholder.com/44'}" style="width:44px;height:44px;border-radius:50%;"><span>${d.displayName}</span>`;
        div.onclick = () => openChat(uid, d.displayName);
        list.appendChild(div);
      }
    }

    function openChat(uid, name) {
      currentChatUser = uid;
      document.getElementById('chat-list').style.display = 'none';
      document.getElementById('chat-window').style.display = 'flex';
      document.getElementById('chat-username').textContent = name;
      loadMessages();
    }

    function loadMessages() {
      const chatId = [currentUser.uid, currentChatUser].sort().join('_');
      if (unsubscribes[chatId]) unsubscribes[chatId]();
      const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("createdAt"));
      unsubscribes[chatId] = onSnapshot(q, snap => {
        const container = document.getElementById('chat-messages');
        container.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          const row = document.createElement('div');
          row.className = `message-row ${d.from === currentUser.uid ? 'sent' : 'received'}`;
          row.innerHTML = `<div class="message-bubble">${d.text}</div>`;
          container.appendChild(row);
        });
        container.scrollTop = container.scrollHeight;
      });
    }

    document.getElementById('btn-send-msg').onclick = async () => {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !currentChatUser) return;
      const chatId = [currentUser.uid, currentChatUser].sort().join('_');
      await addDoc(collection(db, "messages"), { chatId, from: currentUser.uid, to: currentChatUser, text, type: 'text', createdAt: serverTimestamp() });
      input.value = '';
    };

    // ---------- NOTIFICATIONS ----------
    function listenNotifications() {
      const q = query(collection(db, "notifications"), where("to", "==", currentUser.uid), orderBy("createdAt", "desc"), limit(20));
      unsubscribes['notifications'] = onSnapshot(q, snap => {
        let count = 0;
        snap.forEach(doc => { if (!doc.data().read) count++; });
        document.getElementById('btn-notif').dataset.count = count;
      });
    }

    async function addNotification(to, type, message) {
      await addDoc(collection(db, "notifications"), { to, from: currentUser.uid, type, message, read: false, createdAt: serverTimestamp() });
    }

    // ---------- SIDEBAR ----------
    document.getElementById('menu-btn').onclick = () => {
      document.getElementById('side-menu').classList.add('open');
      document.getElementById('menu-overlay').classList.add('show');
    };
    document.getElementById('close-menu').onclick = () => {
      document.getElementById('side-menu').classList.remove('open');
      document.getElementById('menu-overlay').classList.remove('show');
    };
    document.querySelectorAll('.menu-item').forEach(item => {
      item.onclick = () => {
        const act = item.dataset.action;
        if (act === 'profile') navigateTo('profile');
        else if (act === 'edit-profile') openEditProfile();
        else if (act === 'saved') {
          const container = document.getElementById('profile-content');
          container.innerHTML = 'Đang tải bài đã lưu...';
          getDoc(doc(db, "users", currentUser.uid)).then(async snap => {
            const savedIds = snap.data().saved || [];
            if (savedIds.length === 0) {
              container.innerHTML = '<div style="text-align:center;padding:20px;color:#8e8e8e;">Bạn chưa lưu bài viết nào</div>';
              return;
            }
            const grid = document.createElement('div');
            grid.style.cssText = 'display:grid; grid-template-columns: 1fr 1fr 1fr; gap:3px;';
            for (const id of savedIds) {
              const postSnap = await getDoc(doc(db, "posts", id));
              if (postSnap.exists()) {
                const d = postSnap.data();
                const el = document.createElement('img');
                el.src = d.mediaUrls?.[0] || d.mediaUrl;
                el.style.width = '100%'; el.style.aspectRatio = '1/1'; el.style.objectFit = 'cover';
                el.onclick = () => alert(d.caption);
                grid.appendChild(el);
              }
            }
            container.innerHTML = '';
            container.appendChild(grid);
          });
        } else if (act === 'logout') {
          if (confirm('Bạn có chắc muốn đăng xuất?')) {
            signOut(auth);
            showToast('Đã đăng xuất');
          }
        }
        document.getElementById('side-menu').classList.remove('open');
        document.getElementById('menu-overlay').classList.remove('show');
      };
    });

    // Close modals on overlay click
    window.onclick = (e) => {
      if (e.target.classList.contains('modal')) e.target.style.display = 'none';
    };
  </script>
</body>
</html>
