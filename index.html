<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dunukha Pro Max</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #000; display: flex; justify-content: center; }
    #app { max-width: 480px; width: 100%; background: #fff; min-height: 100vh; display: none; flex-direction: column; position: relative; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #dbdbdb; background: #fff; position: sticky; top: 0; z-index: 20; }
    .logo { font-size: 22px; font-weight: 700; } .logo span { color: #0095f6; }
    .header-icons { display: flex; gap: 18px; font-size: 22px; color: #262626; }
    .badge { position: relative; }
    .badge::after { content: attr(data-count); position: absolute; top: -4px; right: -8px; background: #ed4956; color: #fff; border-radius: 50%; padding: 2px 6px; font-size: 11px; display: none; }
    .badge[data-count]:not([data-count="0"])::after { display: block; }
    
    .bottom-nav { display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #dbdbdb; background: #fff; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 10; }
    .bottom-nav i { font-size: 24px; color: #262626; cursor: pointer; padding: 5px; transition: 0.2s; }
    .bottom-nav i.active { color: #0095f6; }
    .bottom-nav i:active { transform: scale(0.9); }

    .page { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; }
    .page.active { display: block; }

    .stories { display: flex; gap: 12px; padding: 12px 15px; border-bottom: 1px solid #dbdbdb; overflow-x: auto; background: #fff; }
    .story-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; }
    .story-ring { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 2px; }
    .story-ring img, .story-ring video { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
    .story-item span { font-size: 11px; color: #262626; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .post { background: #fff; border: 1px solid #dbdbdb; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    .post-header { display: flex; align-items: center; gap: 10px; padding: 12px 15px; cursor: pointer; }
    .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .post-header .username { font-weight: 600; font-size: 14px; }
    .post-media { width: 100%; max-height: 500px; object-fit: contain; background: #000; }
    .post-actions { padding: 10px 15px 5px; display: flex; gap: 15px; }
    .post-actions i { font-size: 26px; cursor: pointer; transition: 0.15s; }
    .post-actions i:active { transform: scale(1.2); }
    .post-actions i.liked { color: #ed4956; }
    .post-likes { padding: 0 15px 5px; font-weight: 600; font-size: 14px; }
    .post-caption { padding: 0 15px 10px; font-size: 14px; }
    .post-caption .username { font-weight: 600; margin-right: 5px; }
    .post-comment-input { display: flex; border-top: 1px solid #efefef; padding: 10px 15px; }
    .post-comment-input input { flex: 1; border: none; outline: none; font-size: 14px; }
    .post-comment-input button { background: none; border: none; color: #0095f6; font-weight: 600; cursor: pointer; }

    .reel-item { position: relative; width: 100%; height: 80vh; scroll-snap-align: start; background: #000; display: flex; align-items: center; justify-content: center; }
    .reel-item video { width: 100%; height: 100%; object-fit: contain; }
    .reel-info { position: absolute; bottom: 20px; left: 20px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.7); }

    .profile-header { display: flex; align-items: center; gap: 20px; padding: 20px; border-bottom: 1px solid #dbdbdb; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #0095f6; }
    .profile-info { flex: 1; }
    .profile-stats { display: flex; gap: 15px; margin: 10px 0; }
    .profile-stats div { text-align: center; font-size: 14px; }
    .profile-stats span { font-weight: 600; display: block; }
    .profile-bio { margin: 5px 0; font-size: 14px; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
    .profile-grid img, .profile-grid video { aspect-ratio: 1/1; object-fit: cover; width: 100%; cursor: pointer; }

    .btn { padding: 6px 16px; border-radius: 8px; border: 1px solid #dbdbdb; background: #fafafa; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: #0095f6; color: white; border: none; }
    .btn-primary:active { opacity: 0.7; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 30; }
    .modal-content { background: #fff; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; max-height: 80%; overflow-y: auto; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 8px; }
    .modal-content button { background: #0095f6; color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; margin-top: 10px; cursor: pointer; }

    .side-menu { position: fixed; top: 0; left: 0; width: 75%; max-width: 300px; height: 100%; background: #fff; z-index: 40; box-shadow: 2px 0 15px rgba(0,0,0,0.2); transform: translateX(-100%); transition: 0.3s; padding: 20px; display: flex; flex-direction: column; }
    .side-menu.open { transform: translateX(0); }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 35; }
    .overlay.show { display: block; }

    .message-row { display: flex; margin: 6px 0; }
    .message-row.sent { justify-content: flex-end; }
    .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 20px; font-size: 15px; word-break: break-word; }
    .sent .message-bubble { background: #0095f6; color: white; }
    .received .message-bubble { background: #efefef; }

    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 12px; padding: 20px; }
    #login-screen h1 { font-size: 3rem; }
    #login-screen button { padding: 12px 30px; border: none; border-radius: 30px; font-weight: 600; color: #fff; cursor: pointer; background: #db4437; width: 80%; max-width: 300px; }
    #login-screen button:nth-child(2) { background: #1877f2; }

    /* scrollbar ẩn */
    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <!-- LOGIN SCREEN (giả, luôn hiện nếu chưa đăng nhập) -->
  <div id="login-screen">
    <h1><span style="color:#0095f6;">D</span>unukha</h1>
    <button onclick="fakeLogin()"><i class="fab fa-google"></i> Đăng nhập Google (Demo)</button>
    <button onclick="fakeLogin()" style="background:#1877f2;"><i class="fab fa-facebook"></i> Facebook (Demo)</button>
    <p style="font-size:13px; color:#888;">(Click để dùng ngay với dữ liệu giả)</p>
  </div>

  <!-- ỨNG DỤNG CHÍNH -->
  <div id="app">
    <div class="header">
      <i class="fas fa-bars" id="menu-btn" style="font-size:22px;cursor:pointer;"></i>
      <div class="logo"><span>D</span>unukha</div>
      <div class="header-icons">
        <i class="far fa-heart badge" id="btn-notif" data-count="3"></i>
        <i class="far fa-paper-plane" id="btn-chat"></i>
      </div>
    </div>

    <!-- Các trang -->
    <div class="page active" id="page-home">
      <div class="stories" id="stories-container"></div>
      <div id="feed-container"></div>
    </div>
    <div class="page" id="page-explore">
      <div style="padding:15px;"><input type="text" id="search-input" placeholder="Tìm kiếm người dùng..." style="width:100%;padding:10px;border-radius:10px;border:1px solid #dbdbdb;"></div>
      <div id="explore-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;padding:0 5px;"></div>
    </div>
    <div class="page" id="page-reels">
      <div id="reels-container" style="height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;"></div>
    </div>
    <div class="page" id="page-post">
      <div style="padding:20px;">
        <label style="display:block;margin-bottom:5px;">Chọn ảnh/video</label>
        <input type="file" id="post-files" accept="image/*,video/*" multiple>
        <div id="preview-container" style="display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;"></div>
        <textarea id="post-caption" placeholder="Caption..." style="width:100%;padding:10px;border:1px solid #dbdbdb;border-radius:8px;"></textarea>
        <button id="btn-submit-post" class="btn btn-primary" style="width:100%;margin-top:10px;">Đăng</button>
      </div>
    </div>
    <div class="page" id="page-profile">
      <div id="profile-content"></div>
    </div>

    <div class="bottom-nav">
      <i class="fas fa-home active" data-page="home"></i>
      <i class="fas fa-search" data-page="explore"></i>
      <i class="fas fa-video" data-page="reels"></i>
      <i class="far fa-plus-square" data-page="post"></i>
      <i class="far fa-user-circle" data-page="profile"></i>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="overlay" id="menu-overlay"></div>
  <div class="side-menu" id="side-menu">
    <i class="fas fa-times" id="close-menu" style="align-self:flex-end;font-size:24px;cursor:pointer;"></i>
    <div class="menu-item" data-action="profile" style="padding:12px 0;cursor:pointer;">Trang cá nhân</div>
    <div class="menu-item" data-action="edit-profile" style="padding:12px 0;cursor:pointer;">Chỉnh sửa hồ sơ</div>
    <div class="menu-item" data-action="saved" style="padding:12px 0;cursor:pointer;">Đã lưu</div>
    <div class="menu-item" data-action="logout" style="padding:12px 0;cursor:pointer;">Đăng xuất</div>
  </div>

  <!-- Modal Story -->
  <div class="modal" id="story-modal">
    <div class="modal-content" style="background:#000;color:#fff;text-align:center;width:100%;max-width:500px;height:80%;">
      <img id="story-img" style="width:100%;height:100%;object-fit:contain;display:none;">
      <video id="story-video" style="width:100%;height:100%;object-fit:contain;display:none;" controls autoplay></video>
      <button id="btn-close-story" style="position:absolute;top:10px;right:10px;background:#fff;border:none;border-radius:50%;width:35px;height:35px;">✕</button>
    </div>
  </div>

  <!-- Modal Chat -->
  <div class="modal" id="chat-modal">
    <div class="modal-content" style="height:90%;display:flex;flex-direction:column;max-width:500px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 id="chat-username">Chat</h3>
        <button id="btn-back-chat" style="background:none;border:none;color:#0095f6;font-size:16px;">Quay lại</button>
      </div>
      <div id="chat-list" style="flex:1;overflow-y:auto;"></div>
      <div id="chat-window" style="display:none;flex:1;flex-direction:column;">
        <div id="chat-messages" style="flex:1;overflow-y:auto;padding:10px;"></div>
        <div style="display:flex;padding:10px;border-top:1px solid #dbdbdb;gap:5px;">
          <input type="text" id="chat-input" placeholder="Nhắn tin..." style="flex:1;border:1px solid #dbdbdb;border-radius:20px;padding:8px 15px;">
          <button id="btn-send-msg" style="background:#0095f6;color:#fff;border:none;border-radius:50%;width:36px;height:36px;"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Edit Profile -->
  <div class="modal" id="edit-modal">
    <div class="modal-content">
      <h3>Chỉnh sửa hồ sơ</h3>
      <input type="text" id="edit-username" placeholder="Username">
      <input type="text" id="edit-displayname" placeholder="Tên hiển thị">
      <textarea id="edit-bio" placeholder="Bio"></textarea>
      <button id="btn-save-edit">Lưu</button>
    </div>
  </div>

  <script>
    // --- DỮ LIỆU GIẢ (để bạn nhấn vào thấy có tác dụng ngay) ---
    const DEMO_USERS = {
      'user1': { displayName: 'Nguyễn Văn A', username: 'nguyenvana', photoURL: 'https://i.pravatar.cc/150?img=1', bio: 'Yêu đời', followers: { 'me': true }, following: {} },
      'user2': { displayName: 'Trần Thị B', username: 'tranthib', photoURL: 'https://i.pravatar.cc/150?img=2', bio: 'Chụp ảnh', followers: {}, following: {} },
      'user3': { displayName: 'Lê Văn C', username: 'levanc', photoURL: 'https://i.pravatar.cc/150?img=3', bio: 'Game thủ', followers: {}, following: {} }
    };
    let DEMO_POSTS = [];
    for (let i=0; i<5; i++) {
      DEMO_POSTS.push({
        id: 'post'+i,
        uid: 'user'+((i%3)+1),
        username: DEMO_USERS['user'+((i%3)+1)].displayName,
        userAvatar: DEMO_USERS['user'+((i%3)+1)].photoURL,
        caption: 'Bài viết demo thứ ' + (i+1) + ' 🎉',
        mediaUrls: ['https://picsum.photos/400/400?random='+i],
        mediaType: 'image',
        likes: [],
        comments: [],
        hashtags: ['demo']
      });
    }

    let currentUser = null;
    let currentChatUserId = null;
    let allUsers = [];

    // --- Hàm giả lập đăng nhập ---
    window.fakeLogin = function() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      currentUser = { uid: 'me', displayName: 'Bạn', photoURL: 'https://i.pravatar.cc/150?img=4', email: 'you@demo.com' };
      allUsers = Object.entries(DEMO_USERS).map(([id, data]) => ({ id, ...data }));
      // Khởi tạo giao diện
      initApp();
    };

    // --- Khởi tạo ứng dụng ---
    function initApp() {
      loadStories();
      loadFeed();
      loadExplore();
      loadReels();
      loadProfile('me');
    }

    // --- Navigation ---
    document.querySelectorAll('.bottom-nav i').forEach(el => {
      el.addEventListener('click', function() {
        document.querySelectorAll('.bottom-nav i').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        const page = this.dataset.page;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        if (page === 'home') { loadStories(); loadFeed(); }
        else if (page === 'explore') loadExplore();
        else if (page === 'reels') loadReels();
        else if (page === 'profile') loadProfile('me');
      });
    });

    // --- Stories ---
    function loadStories() {
      const container = document.getElementById('stories-container');
      container.innerHTML = '';
      const users = ['user1', 'user2', 'user3'];
      users.forEach(uid => {
        const u = DEMO_USERS[uid];
        const div = document.createElement('div');
        div.className = 'story-item';
        div.innerHTML = `<div class="story-ring"><img src="${u.photoURL}"></div><span>${u.displayName}</span>`;
        div.onclick = () => alert('Xem story của ' + u.displayName);
        container.appendChild(div);
      });
      // Story của bạn
      const me = document.createElement('div');
      me.className = 'story-item';
      me.innerHTML = `<div class="story-ring" style="background:#ddd;display:flex;align-items:center;justify-content:center;"><i class="fas fa-plus" style="color:#0095f6;"></i></div><span>Bạn</span>`;
      me.onclick = () => navigateTo('post');
      container.appendChild(me);
    }

    // --- Feed ---
    function loadFeed() {
      const container = document.getElementById('feed-container');
      container.innerHTML = '';
      DEMO_POSTS.forEach(post => renderPost(post, container));
    }

    function renderPost(post, container) {
      const div = document.createElement('div');
      div.className = 'post';
      const liked = post.likes.includes('me');
      div.innerHTML = `
        <div class="post-header">
          <img src="${post.userAvatar}">
          <span class="username">${post.username}</span>
        </div>
        <img class="post-media" src="${post.mediaUrls[0]}" loading="lazy">
        <div class="post-actions">
          <i class="${liked ? 'fas fa-heart liked' : 'far fa-heart'}" data-id="${post.id}"></i>
          <i class="far fa-comment"></i>
          <i class="far fa-paper-plane share-btn"></i>
          <i class="far fa-bookmark save-btn"></i>
        </div>
        <div class="post-likes">${post.likes.length} thích</div>
        <div class="post-caption"><span class="username">${post.username}</span> ${post.caption}</div>
        <div class="post-comment-input">
          <input placeholder="Bình luận..." id="comment-${post.id}">
          <button class="send-comment" data-id="${post.id}">Đăng</button>
        </div>
      `;
      container.appendChild(div);

      // Like
      div.querySelector('[data-id]').onclick = function() {
        const id = this.dataset.id;
        const idx = DEMO_POSTS.findIndex(p => p.id === id);
        if (idx === -1) return;
        if (DEMO_POSTS[idx].likes.includes('me')) {
          DEMO_POSTS[idx].likes = DEMO_POSTS[idx].likes.filter(u => u !== 'me');
          this.classList.remove('liked');
          this.classList.add('far');
          this.classList.remove('fas');
        } else {
          DEMO_POSTS[idx].likes.push('me');
          this.classList.add('liked');
          this.classList.remove('far');
          this.classList.add('fas');
        }
        div.querySelector('.post-likes').textContent = DEMO_POSTS[idx].likes.length + ' thích';
        showToast('Đã like!');
      };

      // Comment
      div.querySelector('.send-comment').onclick = function() {
        const input = document.getElementById('comment-' + this.dataset.id);
        const text = input.value.trim();
        if (!text) return;
        showToast('Bình luận: "' + text + '"');
        input.value = '';
      };

      // Share
      div.querySelector('.share-btn').onclick = function() {
        if (navigator.share) navigator.share({ title: 'Dunukha', text: post.caption, url: post.mediaUrls[0] });
        else alert('Chia sẻ link: ' + post.mediaUrls[0]);
      };

      // Save
      div.querySelector('.save-btn').onclick = function() {
        this.classList.toggle('fas');
        this.classList.toggle('far');
        showToast('Đã lưu!');
      };
    }

    // --- Explore ---
    function loadExplore() {
      const grid = document.getElementById('explore-grid');
      grid.innerHTML = '';
      DEMO_POSTS.slice(0,6).forEach(p => {
        const img = document.createElement('img');
        img.src = p.mediaUrls[0];
        img.style.width = '100%'; img.style.aspectRatio = '1/1'; img.style.objectFit = 'cover';
        img.onclick = () => alert('Bài viết: ' + p.caption);
        grid.appendChild(img);
      });
    }

    // --- Reels ---
    function loadReels() {
      const container = document.getElementById('reels-container');
      container.innerHTML = '';
      // Dùng video demo từ Pexels
      const videoUrls = [
        'https://www.w3schools.com/html/mov_bbb.mp4',
        'https://www.w3schools.com/html/movie.mp4'
      ];
      videoUrls.forEach((url, i) => {
        const div = document.createElement('div');
        div.className = 'reel-item';
        div.innerHTML = `<video src="${url}" controls loop autoplay muted></video><div class="reel-info">Video Reel ${i+1} - <b>Dunukha</b></div>`;
        container.appendChild(div);
      });
    }

    // --- Profile ---
    function loadProfile(uid) {
      const container = document.getElementById('profile-content');
      const user = uid === 'me' ? { ...DEMO_USERS['user1'], uid: 'me', displayName: 'Bạn', username: 'you', photoURL: 'https://i.pravatar.cc/150?img=4' } : DEMO_USERS[uid];
      if (!user) { container.innerHTML = 'Không tìm thấy'; return; }
      const isMe = uid === 'me';
      const isFollowing = user.followers && user.followers['me'];
      container.innerHTML = `
        <div class="profile-header">
          <img class="profile-avatar" src="${user.photoURL}">
          <div class="profile-info">
            <h2>${user.displayName}</h2>
            <p>@${user.username}</p>
            <div class="profile-stats">
              <div><span>${Object.keys(user.followers || {}).length}</span> followers</div>
              <div><span>${Object.keys(user.following || {}).length}</span> following</div>
            </div>
            <p class="profile-bio">${user.bio || 'Chưa có bio'}</p>
            <div style="margin-top:10px;display:flex;gap:8px;">
              ${isMe ? '<button class="btn" id="edit-profile-btn">Chỉnh sửa</button>' :
                `<button class="btn btn-primary" id="follow-btn">${isFollowing ? 'Bỏ theo dõi' : 'Theo dõi'}</button>
                 <button class="btn" id="block-btn" style="background:#ed4956;color:#fff;">Chặn</button>`}
            </div>
          </div>
        </div>
        <div class="profile-grid">
          ${DEMO_POSTS.filter(p => p.uid === uid).map(p => `<img src="${p.mediaUrls[0]}" onclick="alert('${p.caption}')">`).join('')}
        </div>
      `;
      if (isMe) {
        document.getElementById('edit-profile-btn').onclick = () => {
          document.getElementById('edit-modal').style.display = 'flex';
          document.getElementById('edit-username').value = user.username;
          document.getElementById('edit-displayname').value = user.displayName;
          document.getElementById('edit-bio').value = user.bio || '';
        };
      } else {
        document.getElementById('follow-btn').onclick = function() {
          const isFollowing = this.textContent === 'Bỏ theo dõi';
          this.textContent = isFollowing ? 'Theo dõi' : 'Bỏ theo dõi';
          this.classList.toggle('btn-primary');
          showToast(isFollowing ? 'Đã bỏ theo dõi' : 'Đã theo dõi');
        };
        document.getElementById('block-btn').onclick = () => {
          if (confirm('Chặn người này?')) showToast('Đã chặn');
        };
      }
    }

    // --- Post upload (demo) ---
    document.getElementById('post-files').onchange = function() {
      const preview = document.getElementById('preview-container');
      preview.innerHTML = '';
      for (const file of this.files) {
        const reader = new FileReader();
        reader.onload = e => {
          const el = file.type.startsWith('video') ? document.createElement('video') : document.createElement('img');
          el.src = e.target.result;
          el.style.width = '80px'; el.style.height = '80px'; el.style.objectFit = 'cover';
          preview.appendChild(el);
        };
        reader.readAsDataURL(file);
      }
    };

    document.getElementById('btn-submit-post').onclick = function() {
      const files = document.getElementById('post-files').files;
      const caption = document.getElementById('post-caption').value.trim();
      if (files.length === 0) { alert('Chọn ảnh/video'); return; }
      // Thêm bài viết giả vào đầu feed
      DEMO_POSTS.unshift({
        id: 'newpost_' + Date.now(),
        uid: 'me',
        username: 'Bạn',
        userAvatar: 'https://i.pravatar.cc/150?img=4',
        caption: caption || 'Bài viết mới',
        mediaUrls: [URL.createObjectURL(files[0])],
        mediaType: files[0].type.startsWith('video') ? 'video' : 'image',
        likes: [],
        comments: []
      });
      document.getElementById('post-files').value = '';
      document.getElementById('preview-container').innerHTML = '';
      document.getElementById('post-caption').value = '';
      loadFeed();
      showToast('Đã đăng bài!');
    };

    // --- Chat (demo) ---
    document.getElementById('btn-chat').onclick = () => {
      document.getElementById('chat-modal').style.display = 'flex';
      loadChatList();
    };

    function loadChatList() {
      const list = document.getElementById('chat-list');
      list.style.display = 'block';
      document.getElementById('chat-window').style.display = 'none';
      list.innerHTML = '';
      Object.entries(DEMO_USERS).forEach(([uid, data]) => {
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;';
        div.innerHTML = `<img src="${data.photoURL}" style="width:40px;height:40px;border-radius:50%;"><span>${data.displayName}</span>`;
        div.onclick = () => openChat(uid, data.displayName);
        list.appendChild(div);
      });
    }

    function openChat(uid, name) {
      currentChatUserId = uid;
      document.getElementById('chat-list').style.display = 'none';
      document.getElementById('chat-window').style.display = 'flex';
      document.getElementById('chat-username').textContent = name;
      document.getElementById('chat-messages').innerHTML = '';
      // Tin nhắn giả
      const msgs = [
        { from: uid, text: 'Chào bạn!' },
        { from: 'me', text: 'Chào, khỏe không?' },
        { from: uid, text: 'Mình khỏe, cảm ơn!' }
      ];
      msgs.forEach(m => {
        const row = document.createElement('div');
        row.className = `message-row ${m.from === 'me' ? 'sent' : 'received'}`;
        row.innerHTML = `<div class="message-bubble">${m.text}</div>`;
        document.getElementById('chat-messages').appendChild(row);
      });
    }

    document.getElementById('btn-send-msg').onclick = function() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !currentChatUserId) return;
      const row = document.createElement('div');
      row.className = 'message-row sent';
      row.innerHTML = `<div class="message-bubble">${text}</div>`;
      document.getElementById('chat-messages').appendChild(row);
      input.value = '';
      // Giả lập reply
      setTimeout(() => {
        const reply = document.createElement('div');
        reply.className = 'message-row received';
        reply.innerHTML = `<div class="message-bubble">Cảm ơn bạn!</div>`;
        document.getElementById('chat-messages').appendChild(reply);
      }, 1000);
    };

    document.getElementById('btn-back-chat').onclick = () => {
      document.getElementById('chat-modal').style.display = 'none';
    };

    // --- Notifications ---
    document.getElementById('btn-notif').onclick = () => {
      document.getElementById('btn-notif').dataset.count = '0';
      showToast('Bạn có 3 thông báo mới (demo)');
    };

    // --- Side menu ---
    document.getElementById('menu-btn').onclick = () => {
      document.getElementById('side-menu').classList.add('open');
      document.getElementById('menu-overlay').classList.add('show');
    };
    document.getElementById('close-menu').onclick = () => {
      document.getElementById('side-menu').classList.remove('open');
      document.getElementById('menu-overlay').classList.remove('show');
    };
    document.querySelectorAll('.menu-item').forEach(item => {
      item.onclick = () => {
        const act = item.dataset.action;
        if (act === 'profile') navigateTo('profile');
        else if (act === 'edit-profile') document.getElementById('edit-modal').style.display = 'flex';
        else if (act === 'logout') { document.getElementById('app').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; }
        else if (act === 'saved') showToast('Tính năng đang phát triển');
        document.getElementById('side-menu').classList.remove('open');
        document.getElementById('menu-overlay').classList.remove('show');
      };
    });

    // --- Edit profile ---
    document.getElementById('btn-save-edit').onclick = () => {
      document.getElementById('edit-modal').style.display = 'none';
      showToast('Đã lưu thông tin');
    };

    // --- Utility ---
    function showToast(msg) {
      const div = document.createElement('div');
      div.textContent = msg;
      div.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 25px;border-radius:30px;z-index:100;font-size:14px;box-shadow:0 4px 10px rgba(0,0,0,0.3);';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2000);
    }

    function navigateTo(page) {
      document.querySelectorAll('.bottom-nav i').forEach(i => i.classList.remove('active'));
      document.querySelector(`[data-page="${page}"]`).classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      if (page === 'home') { loadStories(); loadFeed(); }
      else if (page === 'explore') loadExplore();
      else if (page === 'reels') loadReels();
      else if (page === 'profile') loadProfile('me');
    }

    // --- Tự động đăng nhập khi mở ứng dụng (cho demo) ---
    // Bạn có thể bỏ comment dòng dưới để vào thẳng app
    // fakeLogin();
  </script>
</body>
</html>
