<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

<body>
  <!-- ... (Giữ nguyên HTML như các phiên bản trước, tôi đã thêm nút 3 chấm và menu) ... -->

  <div id="login-screen">
    <!-- ... (Giữ nguyên form login) ... -->
  </div>
  <div id="app">
    <!-- Header -->

    <!-- Bottom Nav -->
    <!-- ... (Giữ nguyên bottom nav) ... -->

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where, getDocs, setDoc, getDoc, limit, startAfter, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJ3DAWyschGA6fM5VmBndLI0cGSaFF46U",
      authDomain: "dunukhasite.firebaseapp.com",
      projectId: "dunukhasite",
      storageBucket: "dunukhasite.firebasestorage.app",
      messagingSenderId: "841226738327",
      appId: "1:841226738327:web:5e0192799adbe1179067d2"
    };
    const IMGBB_API_KEY = "d4802501f212046a8d74561bbdaf6dd3";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    const facebookProvider = new FacebookAuthProvider();

    let currentUser = null;
    let currentChatUser = null;
    let unsubscribes = {};
    let allUsersCache = null;
    let lastPostDoc = null;
    let isLoadingPosts = false;
    let isPhoneLogin = false;
    let currentPostModalId = null;

    // ---------- TOAST ----------
    function showToast(msg, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._hideTimer);
      toast._hideTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    // ---------- AUTH UI TOGGLE ----------
    // ... (Giữ nguyên logic chuyển đổi form login) ...

    // ---------- EMAIL AUTH ----------
    // ... (Giữ nguyên) ...

    // ---------- PHONE AUTH ----------
    // ... (Giữ nguyên) ...

    // ---------- SOCIAL AUTH ----------
    // ... (Giữ nguyên) ...

    // ---------- AUTH STATE LISTENER ----------
    onAuthStateChanged(auth, async user => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        await ensureUserDoc(user);
        navigateTo('home');
        listenNotifications();
        showToast('Đăng nhập thành công!');
      } else {
        currentUser = null;
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        Object.values(unsubscribes).forEach(u => u());
        unsubscribes = {};
      }
    });

    async function ensureUserDoc(user) {
      const ref = doc(db, "users", user.uid);
      if (!(await getDoc(ref)).exists()) {
        await setDoc(ref, {
          displayName: user.displayName || "Người dùng",
          email: user.email || "Không có email",
          phoneNumber: user.phoneNumber || "Không có SĐT",
          photoURL: user.photoURL || "https://via.placeholder.com/150",
          coverPhotoURL: "",
          username: user.email ? user.email.split('@')[0] : "user" + user.uid.slice(0,5),
          bio: "",
          website: "",
          location: "",
          work: "",
          education: "",
          interests: [],
          socialLinks: {},
          followers: {},
          following: {},
          saved: [],
          blocked: {},
          isPrivate: false,
          verified: false,
          createdAt: serverTimestamp()
        });
      }
    }

    // ---------- IMGBB ----------
    async function uploadImgBB(file) {
      const fd = new FormData();
      fd.append('image', file);
      try {
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.error?.message || 'Upload lỗi');
        return data.data.url;
      } catch (e) {
        console.error('ImgBB upload error:', e);
        throw new Error('Không thể tải lên ảnh. Vui lòng kiểm tra kết nối hoặc thử lại.');
      }
    }

    // ---------- NAVIGATION ----------
    // ... (Giữ nguyên) ...

    // ---------- STORIES ----------
    // ... (Giữ nguyên) ...

    // ---------- FEED (Đã thêm Chi tiết bài viết, Reaction, Bình luận lồng nhau) ----------
    function loadFeed() {
      document.getElementById('feed-container').innerHTML = '';
      lastPostDoc = null;
      fetchPosts();
    }

    async function fetchPosts() {
      if (isLoadingPosts) return;
      isLoadingPosts = true;
      document.getElementById('feed-loader').style.display = 'block';
      try {
        const q = lastPostDoc ?
          query(collection(db, "posts"), orderBy("createdAt", "desc"), startAfter(lastPostDoc), limit(5)) :
          query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(5));
        const snap = await getDocs(q);
        if (!snap.empty) {
          snap.forEach(doc => { renderPost(doc.data(), doc.id); lastPostDoc = doc; });
        } else {
          if (!lastPostDoc) document.getElementById('feed-container').innerHTML = '<div style="text-align:center;padding:20px;color:#8e8e8e;">Chưa có bài viết nào. Hãy là người đầu tiên!</div>';
          else document.getElementById('feed-loader').textContent = 'Đã hết bài viết';
        }
      } catch (e) {
        console.error('Lỗi tải feed:', e);
        showToast('Lỗi tải bài viết');
      }
      isLoadingPosts = false;
      document.getElementById('feed-loader').style.display = 'none';
    }

    document.getElementById('page-home').addEventListener('scroll', function() {
      if (this.scrollHeight - this.scrollTop - this.clientHeight < 100 && !isLoadingPosts) fetchPosts();
    });

    function renderPost(post, id) {
      const isOwner = post.uid === currentUser.uid;
      const div = document.createElement('div');
      div.className = 'post';
      div.dataset.postId = id;
      
      // Xây dựng phần media (nhiều ảnh/video)
      let mediaHtml = '';
      const mediaUrls = post.mediaUrls || [post.mediaUrl];
      mediaUrls.forEach(url => {
        const isVideo = url.match(/\.(mp4|webm|ogg)$/i);
        mediaHtml += isVideo 
          ? `<video class="post-media" src="${url}" controls preload="metadata"></video>` 
          : `<img class="post-media" src="${url}" loading="lazy" onclick="openImageFullscreen('${url}')">`;
      });

      // Reaction (các nút cảm xúc)
      const reactionCounts = post.reactions || { like: 0 };
      const userReaction = post.userReactions?.[currentUser.uid] || 'like';

      div.innerHTML = `
        <div class="post-header" data-uid="${post.uid}">
          <img src="${post.userAvatar || 'https://via.placeholder.com/32'}">
          <span class="username">${post.username}</span>
          <div style="margin-left:auto; position:relative;">
            <i class="fas fa-ellipsis-v" style="cursor:pointer; padding:0 5px;" data-id="${id}"></i>
            <!-- Menu 3 chấm -->
            <div class="post-menu" data-id="${id}" style="display:none; position:absolute; right:0; top:25px; background:white; border:1px solid #dbdbdb; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); z-index:10; min-width:150px;">
              <div class="menu-option" data-action="report" data-id="${id}">🚩 Báo cáo</div>
              <div class="menu-option" data-action="share" data-id="${id}">🔗 Chia sẻ</div>
              <div class="menu-option" data-action="copy" data-id="${id}">📋 Sao chép liên kết</div>
              <div class="menu-option" data-action="save" data-id="${id}">📌 Lưu / Bỏ lưu</div>
              ${isOwner ? '<div class="menu-option" data-action="edit" data-id="'+id+'">✏️ Chỉnh sửa</div>' : ''}
              ${isOwner ? '<div class="menu-option" data-action="delete" data-id="'+id+'">🗑️ Xóa</div>' : ''}
            </div>
          </div>
        </div>
        <div class="post-body" onclick="openPostDetail('${id}')">${mediaHtml}</div>
        <div class="post-actions">
          <div class="reactions">
            <i class="${userReaction === 'like' ? 'fas fa-thumbs-up' : 'far fa-thumbs-up'}" data-reaction="like" data-id="${id}"></i>
            <i class="${userReaction === 'love' ? 'fas fa-heart' : 'far fa-heart'}" data-reaction="love" data-id="${id}"></i>
            <i class="${userReaction === 'haha' ? 'fas fa-laugh' : 'far fa-laugh'}" data-reaction="haha" data-id="${id}"></i>
            <i class="${userReaction === 'wow' ? 'fas fa-surprise' : 'far fa-surprise'}" data-reaction="wow" data-id="${id}"></i>
            <i class="${userReaction === 'sad' ? 'fas fa-frown' : 'far fa-frown'}" data-reaction="sad" data-id="${id}"></i>
            <i class="${userReaction === 'angry' ? 'fas fa-angry' : 'far fa-angry'}" data-reaction="angry" data-id="${id}"></i>
          </div>
          <i class="far fa-comment" onclick="openPostDetail('${id}')"></i>
          <i class="far fa-paper-plane share-btn" data-id="${id}"></i>
          <i class="far fa-bookmark save-btn" data-id="${id}"></i>
        </div>
        <div class="post-likes">${reactionCounts.like || 0} thích</div>
        <div class="post-caption"><span class="username">${post.username}</span> ${post.caption || ''} ${post.hashtags?.map(t=>'#'+t).join(' ')||''}</div>
        <div class="post-comment-input">
          <input placeholder="Bình luận..." id="comment-${id}">
          <button class="send-comment" data-id="${id}">Đăng</button>
        </div>
        <div class="post-comments" id="comments-${id}"></div>
      `;
      document.getElementById('feed-container').appendChild(div);

      // ---------- XỬ LÝ SỰ KIỆN ----------
      
      // 1. Mở menu 3 chấm
      div.querySelector('.fa-ellipsis-v').onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll('.post-menu').forEach(m => m.style.display = 'none');
        const menu = div.querySelector('.post-menu');
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
      };

      // 2. Xử lý các tùy chọn menu
      div.querySelectorAll('.menu-option').forEach(opt => {
        opt.onclick = async (e) => {
          e.stopPropagation();
          const action = opt.dataset.action;
          const postId = opt.dataset.id;
          if (action === 'delete') {
            if (confirm('Bạn có chắc muốn xóa bài viết này?')) {
              await deleteDoc(doc(db, "posts", postId));
              div.remove();
              showToast('Đã xóa bài viết');
            }
          } else if (action === 'save') {
            const userRef = doc(db, "users", currentUser.uid);
            const snap = await getDoc(userRef);
            const saved = snap.data().saved || [];
            if (saved.includes(postId)) {
              await updateDoc(userRef, { saved: arrayRemove(postId) });
              showToast('Đã bỏ lưu');
            } else {
              await updateDoc(userRef, { saved: arrayUnion(postId) });
              showToast('Đã lưu bài viết');
            }
          } else if (action === 'report') {
            const reason = prompt('Lý do báo cáo:');
            if (reason) {
              await addDoc(collection(db, "reports"), { reporter: currentUser.uid, postId: postId, reason, createdAt: serverTimestamp() });
              showToast('Đã gửi báo cáo');
            }
          } else if (action === 'share') {
            const url = post.mediaUrls?.[0] || post.mediaUrl;
            if (navigator.share) navigator.share({ title: 'Dunukha', text: post.caption, url });
            else alert('Chia sẻ link: ' + url);
          } else if (action === 'copy') {
            const url = post.mediaUrls?.[0] || post.mediaUrl;
            await navigator.clipboard.writeText(url);
            showToast('Đã sao chép liên kết');
          } else if (action === 'edit') {
            // Logic chỉnh sửa bài viết – có thể mở modal
            showToast('Tính năng chỉnh sửa đang phát triển');
          }
          document.querySelectorAll('.post-menu').forEach(m => m.style.display = 'none');
        };
      });

      // 3. Đóng menu khi click ra ngoài
      document.addEventListener('click', () => {
        document.querySelectorAll('.post-menu').forEach(m => m.style.display = 'none');
      });

      // 4. Reaction
      div.querySelectorAll('.reactions i').forEach(icon => {
        icon.onclick = async (e) => {
          e.stopPropagation();
          const reaction = icon.dataset.reaction;
          const postId = icon.dataset.id;
          const ref = doc(db, "posts", postId);
          const snap = await getDoc(ref);
          const postData = snap.data();
          const currentReaction = postData.userReactions?.[currentUser.uid] || null;
          
          if (currentReaction === reaction) {
            // Bỏ reaction
            await updateDoc(ref, { 
              [`reactions.${reaction}`]: increment(-1),
              [`userReactions.${currentUser.uid}`]: null
            });
            icon.classList.remove('fas');
            icon.classList.add('far');
          } else {
            // Nếu đã có reaction khác, trừ đi 1 ở reaction cũ
            if (currentReaction) {
              await updateDoc(ref, { [`reactions.${currentReaction}`]: increment(-1) });
            }
            // Thêm reaction mới
            await updateDoc(ref, { 
              [`reactions.${reaction}`]: increment(1),
              [`userReactions.${currentUser.uid}`]: reaction
            });
            icon.classList.add('fas');
            icon.classList.remove('far');
            // Cập nhật tất cả các icon reaction khác về far
            div.querySelectorAll('.reactions i').forEach(otherIcon => {
              if (otherIcon.dataset.reaction !== reaction) {
                otherIcon.classList.add('far');
                otherIcon.classList.remove('fas');
              }
            });
            // Cập nhật số lượt thích (like)
            if (reaction === 'like') {
              const likesSpan = div.querySelector('.post-likes');
              const newCount = (await getDoc(ref)).data().reactions?.like || 0;
              likesSpan.textContent = newCount + ' thích';
            }
          }
          if (postData.uid !== currentUser.uid) {
            addNotification(postData.uid, 'reaction', `${currentUser.displayName} đã phản ứng với bài của bạn`);
          }
        };
      });

      // 5. Comment
      div.querySelector('.send-comment').onclick = async () => {
        const input = document.getElementById(`comment-${id}`);
        const text = input.value.trim();
        if (!text) return;
        const commentData = { uid: currentUser.uid, username: currentUser.displayName, avatar: currentUser.photoURL, text, createdAt: serverTimestamp(), replies: [] };
        await updateDoc(doc(db, "posts", id), { comments: arrayUnion(commentData) });
        if (post.uid !== currentUser.uid) addNotification(post.uid, 'comment', `${currentUser.displayName}: ${text}`);
        input.value = '';
        showToast('Đã bình luận');
        // Tải lại comments
        loadComments(id);
      };

      // 6. Save (nút bookmark)
      div.querySelector('.save-btn').onclick = async () => {
        const userRef = doc(db, "users", currentUser.uid);
        const snap = await getDoc(userRef);
        const saved = snap.data().saved || [];
        if (saved.includes(id)) {
          await updateDoc(userRef, { saved: arrayRemove(id) });
          showToast('Đã bỏ lưu');
        } else {
          await updateDoc(userRef, { saved: arrayUnion(id) });
          showToast('Đã lưu bài viết');
        }
      };

      // 7. Share
      div.querySelector('.share-btn').onclick = () => {
        const url = post.mediaUrls?.[0] || post.mediaUrl;
        if (navigator.share) navigator.share({ title: 'Dunukha', text: post.caption, url });
        else prompt("Copy link:", url);
      };

      // Tải comments
      loadComments(id);
    }

    // ---------- LOAD COMMENTS (Hỗ trợ trả lời lồng nhau) ----------
    async function loadComments(postId) {
      const container = document.getElementById(`comments-${postId}`);
      if (!container) return;
      const snap = await getDoc(doc(db, "posts", postId));
      if (!snap.exists()) return;
      const comments = snap.data().comments || [];
      container.innerHTML = '';
      comments.forEach((comment, index) => {
        const div = document.createElement('div');
        div.style.cssText = 'padding:8px 0; border-bottom:1px solid #efefef;';
        div.innerHTML = `
          <div style="display:flex; gap:8px;">
            <img src="${comment.avatar || 'https://via.placeholder.com/24'}" style="width:24px;height:24px;border-radius:50%;">
            <div>
              <span style="font-weight:600;">${comment.username}</span>
              <span>${comment.text}</span>
              <div style="margin-top:4px;font-size:12px;color:#888;cursor:pointer;" class="reply-btn" data-postId="${postId}" data-commentId="${index}">Trả lời</div>
            </div>
          </div>
        `;
        container.appendChild(div);

        // Trả lời bình luận
        const replyBtn = div.querySelector('.reply-btn');
        replyBtn.onclick = () => {
          const replyInput = document.createElement('input');
          replyInput.placeholder = 'Viết trả lời...';
          replyInput.style.cssText = 'width:100%; padding:5px; margin-top:5px; border:1px solid #dbdbdb; border-radius:4px;';
          const sendReplyBtn = document.createElement('button');
          sendReplyBtn.textContent = 'Gửi';
          sendReplyBtn.style.cssText = 'background:#0095f6; color:white; border:none; padding:5px 10px; border-radius:4px; margin-top:5px; cursor:pointer;';
          sendReplyBtn.onclick = async () => {
            const text = replyInput.value.trim();
            if (!text) return;
            const ref = doc(db, "posts", postId);
            const replyData = { uid: currentUser.uid, username: currentUser.displayName, avatar: currentUser.photoURL, text, createdAt: serverTimestamp() };
            // Lấy comments hiện tại, thêm reply vào comment cụ thể
            const snap = await getDoc(ref);
            const currentComments = snap.data().comments || [];
            if (currentComments[index]) {
              currentComments[index].replies = currentComments[index].replies || [];
              currentComments[index].replies.push(replyData);
              await updateDoc(ref, { comments: currentComments });
              showToast('Đã trả lời');
              loadComments(postId);
            }
          };
          div.appendChild(replyInput);
          div.appendChild(sendReplyBtn);
          replyInput.focus();
          replyBtn.style.display = 'none';
        };
      });
    }

    // ---------- POST DETAIL (Modal xem chi tiết) ----------
    window.openPostDetail = function(postId) {
      // Mở modal xem chi tiết bài viết (có thể thay bằng navigateTo('post-detail'))
      showToast('Đang mở chi tiết bài viết...');
      // Implement sau: chuyển đến một trang/page riêng hoặc modal lớn hơn
    };

    // ---------- FULLSCREEN IMAGE ----------
    window.openImageFullscreen = function(url) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; display:flex; justify-content:center; align-items:center;';
      const img = document.createElement('img');
      img.src = url;
      img.style.cssText = 'max-width:90%; max-height:90%; object-fit:contain;';
      modal.onclick = () => modal.remove();
      modal.appendChild(img);
      document.body.appendChild(modal);
    };

    // ---------- POST CREATE (Nhiều ảnh, video, location) ----------
    document.getElementById('post-files').onchange = function() {
      const preview = document.getElementById('preview-container');
      preview.innerHTML = '';
      for (const file of this.files) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const el = file.type.startsWith('video') ? document.createElement('video') : document.createElement('img');
          el.src = e.target.result;
          el.style.width = '100px'; el.style.height = '100px'; el.style.objectFit = 'cover';
          preview.appendChild(el);
        };
        reader.readAsDataURL(file);
      }
    };

    document.getElementById('btn-submit-post').onclick = async () => {
      const files = document.getElementById('post-files').files;
      const caption = document.getElementById('post-caption').value.trim();
      const hashtags = document.getElementById('post-hashtags').value.split(' ').filter(t => t.startsWith('#')).map(t => t.slice(1));
      if (!files.length) return showToast("Vui lòng chọn ảnh/video");
      document.getElementById('btn-submit-post').disabled = true;
      document.getElementById('btn-submit-post').textContent = 'Đang đăng...';
      try {
        const urls = [];
        for (const file of files) {
          const url = await uploadImgBB(file);
          urls.push(url);
        }
        const userData = (await getDoc(doc(db, "users", currentUser.uid))).data();
        await addDoc(collection(db, "posts"), {
          uid: currentUser.uid,
          username: userData.displayName,
          userAvatar: userData.photoURL,
          mediaUrls: urls,
          mediaType: files[0].type.startsWith('video') ? 'video' : 'image',
          caption, hashtags,
          likes: [], reactions: { like: 0 }, userReactions: {},
          comments: [],
          views: 0,
          isPinned: false,
          privacy: 'public', // public, followers, private
          location: '',
          createdAt: serverTimestamp()
        });
        document.getElementById('post-files').value = '';
        document.getElementById('preview-container').innerHTML = '';
        document.getElementById('post-caption').value = '';
        document.getElementById('post-hashtags').value = '';
        showToast("Đã đăng bài!");
        navigateTo('home');
      } catch (e) {
        showToast('Lỗi đăng bài: ' + e.message);
      } finally {
        document.getElementById('btn-submit-post').disabled = false;
        document.getElementById('btn-submit-post').textContent = 'Đăng';
      }
    };

    // ---------- REELS ----------
    async function loadReels() {
      const container = document.getElementById('reels-container');
      container.innerHTML = '';
      try {
        const snap = await getDocs(query(collection(db, "posts"), where("mediaType", "==", "video"), orderBy("createdAt", "desc"), limit(10)));
        snap.forEach(doc => {
          const d = doc.data();
          const div = document.createElement('div');
          div.className = 'reel-item';
          div.innerHTML = `<video src="${d.mediaUrls[0]}" controls preload="metadata"></video><div class="reel-info">${d.username}: ${d.caption}</div>`;
          container.appendChild(div);
        });
      } catch (e) { console.error('Lỗi tải reels:', e); }
    }

    // ---------- EXPLORE ----------
    async function loadExplore() {
      const grid = document.getElementById('explore-grid');
      grid.innerHTML = '';
      try {
        const snap = await getDocs(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(12)));
        snap.forEach(doc => {
          const p = doc.data();
          const el = document.createElement('img');
          el.src = p.mediaUrls?.[0] || p.mediaUrl;
          el.style.width = '100%'; el.style.aspectRatio = '1/1'; el.style.objectFit = 'cover';
          el.onclick = () => loadProfile(p.uid);
          grid.appendChild(el);
        });
      } catch (e) { console.error('Lỗi tải explore:', e); }
      document.getElementById('search-input').value = '';
    }

    // ---------- SEARCH ----------
    document.getElementById('search-input').addEventListener('input', async (e) => {
      const kw = e.target.value.trim().toLowerCase();
      const grid = document.getElementById('explore-grid');
      if (kw) {
        if (!allUsersCache) {
          const snap = await getDocs(collection(db, "users"));
          allUsersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        }
        const filtered = allUsersCache.filter(u => 
          u.displayName?.toLowerCase().includes(kw) || 
          u.username?.toLowerCase().includes(kw)
        );
        grid.innerHTML = '';
        filtered.forEach(u => {
          const div = document.createElement('div');
          div.style.cssText = 'display:flex; align-items:center; gap:10px; padding:10px; cursor:pointer; border-bottom:1px solid #efefef;';
          div.innerHTML = `
            <img src="${u.photoURL || 'https://via.placeholder.com/44'}" style="width:44px;height:44px;border-radius:50%;">
            <div>
              <div style="font-weight:600;">${u.displayName}</div>
              <div style="color:#888; font-size:12px;">@${u.username}</div>
            </div>
          `;
          div.onclick = () => loadProfile(u.id);
          grid.appendChild(div);
        });
      } else {
        loadExplore();
      }
    });

    // ---------- PROFILE (Đầy đủ thông tin: quê quán, công việc, học vấn, sở thích, liên kết MXH) ----------
    async function loadProfile(uid) {
      const container = document.getElementById('profile-content');
      container.innerHTML = 'Đang tải...';
      const ref = doc(db, "users", uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) { container.innerHTML = 'Người dùng không tồn tại'; return; }
      const data = snap.data();
      const isMe = uid === currentUser.uid;
      const isFollowing = data.followers?.[currentUser.uid];
      const isPrivate = data.isPrivate === true;
      if (data.blocked?.[currentUser.uid]) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">Bạn đã bị chặn bởi người dùng này</div>';
        return;
      }
      const canViewPosts = isMe || !isPrivate || isFollowing;
      container.innerHTML = `
        <div class="profile-header">
          ${data.coverPhotoURL ? `<div style="width:100%; height:150px; overflow:hidden; margin-bottom:10px;"><img src="${data.coverPhotoURL}" style="width:100%; height:100%; object-fit:cover;"></div>` : ''}
          <img class="profile-avatar" src="${data.photoURL || 'https://via.placeholder.com/150'}">
          <div class="profile-info">
            <h2>${data.displayName} ${data.verified ? '✅' : ''}</h2>
            <p>@${data.username}</p>
            <div style="display:flex; gap:10px; font-size:12px; color:#888;">
              <span>📍 ${data.location || 'Chưa có địa điểm'}</span>
              <span>💼 ${data.work || 'Chưa có công việc'}</span>
              <span>🎓 ${data.education || 'Chưa có học vấn'}</span>
            </div>
            <div class="profile-stats">
              <div><span>${Object.keys(data.followers||{}).length}</span> followers</div>
              <div><span>${Object.keys(data.following||{}).length}</span> following</div>
              <div><span>${(data.saved||[]).length}</span> đã lưu</div>
            </div>
            <p class="profile-bio">${data.bio || ''}</p>
            ${data.website ? `<a href="${data.website}" target="_blank">🌐 ${data.website}</a>` : ''}
            ${data.socialLinks ? Object.entries(data.socialLinks).map(([platform, link]) => `<a href="${link}" target="_blank">${platform}</a>`).join(' ') : ''}
            ${isPrivate ? '<span style="background:#ddd; padding:2px 10px; border-radius:10px; font-size:11px; margin-left:5px;">🔒 Riêng tư</span>' : ''}
            <div style="margin-top:10px;">
              ${isMe ? `
                <button class="btn" id="edit-profile-btn">Chỉnh sửa</button>
                <button class="btn" id="privacy-toggle-btn">${isPrivate ? 'Chuyển sang Công khai' : 'Chuyển sang Riêng tư'}</button>
              ` : `
                <button class="btn btn-primary" id="follow-btn">${isFollowing ? 'Bỏ theo dõi' : 'Theo dõi'}</button>
                <button class="btn" id="message-btn" style="background:#0095f6; color:white;">Nhắn tin</button>
                <button class="btn" id="block-btn" style="background:#ed4956; color:white;">Chặn</button>
                <button class="btn" id="report-btn">Báo cáo</button>
              `}
            </div>
          </div>
        </div>
        <div class="profile-grid" id="profile-grid"></div>
      `;
      const grid = document.getElementById('profile-grid');
      if (canViewPosts) {
        try {
          const postsQ = query(collection(db, "posts"), where("uid", "==", uid), orderBy("createdAt", "desc"), limit(12));
          const postsSnap = await getDocs(postsQ);
          grid.innerHTML = '';
          postsSnap.forEach(doc => {
            const d = doc.data();
            const el = d.mediaType === 'video' ? document.createElement('video') : document.createElement('img');
            el.src = d.mediaUrls?.[0] || d.mediaUrl;
            el.style.width = '100%'; el.style.aspectRatio = '1/1'; el.style.objectFit = 'cover';
            el.style.cursor = 'pointer';
            el.onclick = () => alert(`📷 ${d.caption || 'Không có caption'}`);
            grid.appendChild(el);
          });
          if (grid.innerHTML === '') {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#8e8e8e; padding:20px;">Chưa có bài viết nào</div>';
          }
        } catch (e) { console.error('Lỗi tải profile posts:', e); }
      } else {
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#8e8e8e; padding:40px;">🔒 Tài khoản riêng tư<br>Hãy theo dõi để xem bài viết</div>';
      }
      if (isMe) {
        document.getElementById('edit-profile-btn').onclick = openEditProfile;
        document.getElementById('privacy-toggle-btn').onclick = async () => {
          const newPrivacy = !isPrivate;
          await updateDoc(doc(db, "users", currentUser.uid), { isPrivate: newPrivacy });
          showToast(`Đã chuyển sang ${newPrivacy ? 'Riêng tư' : 'Công khai'}`);
          loadProfile(currentUser.uid);
        };
      } else {
        document.getElementById('follow-btn').onclick = async () => {
          if (isFollowing) {
            await updateDoc(doc(db, "users", uid), { [`followers.${currentUser.uid}`]: false });
            await updateDoc(doc(db, "users", currentUser.uid), { [`following.${uid}`]: false });
            showToast('Đã bỏ theo dõi');
          } else {
            await updateDoc(doc(db, "users", uid), { [`followers.${currentUser.uid}`]: true });
            await updateDoc(doc(db, "users", currentUser.uid), { [`following.${uid}`]: true });
            addNotification(uid, 'follow', `${currentUser.displayName} theo dõi bạn`);
            showToast('Đã theo dõi');
          }
          loadProfile(uid);
        };
        document.getElementById('message-btn').onclick = () => {
          // Mở chat với người này
          document.getElementById('btn-chat').click();
          // Sau đó có thể tự động mở chat với uid
          setTimeout(() => openChat(uid, data.displayName), 500);
        };
        document.getElementById('block-btn').onclick = async () => {
          if (!confirm('Chặn người này?')) return;
          await updateDoc(doc(db, "users", currentUser.uid), { [`blocked.${uid}`]: true });
          if (isFollowing) {
            await updateDoc(doc(db, "users", uid), { [`followers.${currentUser.uid}`]: false });
            await updateDoc(doc(db, "users", currentUser.uid), { [`following.${uid}`]: false });
          }
          showToast('Đã chặn');
          loadProfile(uid);
        };
        document.getElementById('report-btn').onclick = async () => {
          const reason = prompt('Lý do báo cáo:');
          if (!reason) return;
          await addDoc(collection(db, "reports"), { reporter: currentUser.uid, target: uid, reason, createdAt: serverTimestamp() });
          showToast('Đã gửi báo cáo');
        };
      }
    }

    function openEditProfile() {
      document.getElementById('edit-modal').style.display = 'flex';
      getDoc(doc(db, "users", currentUser.uid)).then(snap => {
        const d = snap.data();
        document.getElementById('edit-username').value = d.username || '';
        document.getElementById('edit-displayname').value = d.displayName || '';
        document.getElementById('edit-bio').value = d.bio || '';
        document.getElementById('edit-website').value = d.website || '';
        // Thêm các trường mới: location, work, education, interests, socialLinks
        document.getElementById('edit-location').value = d.location || '';
        document.getElementById('edit-work').value = d.work || '';
        document.getElementById('edit-education').value = d.education || '';
        document.getElementById('edit-interests').value = (d.interests || []).join(', ');
        document.getElementById('edit-social').value = JSON.stringify(d.socialLinks || {});
      });
    }

    document.getElementById('btn-save-edit').onclick = async () => {
      const updates = {
        username: document.getElementById('edit-username').value.trim(),
        displayName: document.getElementById('edit-displayname').value.trim(),
        bio: document.getElementById('edit-bio').value.trim(),
        website: document.getElementById('edit-website').value.trim(),
        location: document.getElementById('edit-location').value.trim(),
        work: document.getElementById('edit-work').value.trim(),
        education: document.getElementById('edit-education').value.trim(),
        interests: document.getElementById('edit-interests').value.split(',').map(s => s.trim()).filter(s => s),
        socialLinks: JSON.parse(document.getElementById('edit-social').value || '{}')
      };
      const file = document.getElementById('edit-avatar-file').files[0];
      if (file) {
        try {
          updates.photoURL = await uploadImgBB(file);
        } catch (e) { return showToast('Lỗi upload avatar: ' + e.message); }
      }
      const coverFile = document.getElementById('edit-cover-file').files[0];
      if (coverFile) {
        try {
          updates.coverPhotoURL = await uploadImgBB(coverFile);
        } catch (e) { return showToast('Lỗi upload ảnh bìa: ' + e.message); }
      }
      await updateDoc(doc(db, "users", currentUser.uid), updates);
      document.getElementById('edit-modal').style.display = 'none';
      loadProfile(currentUser.uid);
      showToast('Đã cập nhật hồ sơ');
    };

    // ---------- CHAT ----------
    // ... (Giữ nguyên logic chat cũ, nhưng cần thêm tính năng đã gửi/đã nhận/đã xem) ...
    // ---------- NOTIFICATIONS ----------
    // ... (Giữ nguyên logic thông báo) ...

    // ---------- SIDEBAR ----------
    // ... (Giữ nguyên logic sidebar) ...

    // ---------- TOGGLE DARK MODE ----------
    // Thêm nút Dark Mode trong sidebar hoặc header
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('dunukha-dark-mode', document.body.classList.contains('dark-mode'));
    }
    // Kiểm tra đã bật dark mode chưa
    if (localStorage.getItem('dunukha-dark-mode') === 'true') {
      document.body.classList.add('dark-mode');
    }

    // ---------- CLOSE MODALS ----------
    window.onclick = (e) => {
      if (e.target.classList.contains('modal')) e.target.style.display = 'none';
    };
  </script>
</body>
</html>
