<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dunukha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background: #fafafa; display: flex; justify-content: center; }
    #app { max-width: 500px; width: 100%; background: #fff; min-height: 100vh; display: none; flex-direction: column; position: relative; }
    /* Header */
    .header { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #dbdbdb; background: #fff; position: sticky; top: 0; z-index: 20; }
    .menu-btn { font-size: 24px; cursor: pointer; margin-right: 15px; color: #262626; }
    .logo-text { font-size: 26px; font-weight: 700; color: #262626; flex: 1; }
    .logo-text span { color: #0095f6; }
    .header-icons { display: flex; gap: 18px; }
    .header-icons i { font-size: 22px; cursor: pointer; }
    .badge { position: relative; }
    .badge::after { content: attr(data-count); position: absolute; top: -8px; right: -10px; background: #ed4956; color: white; border-radius: 10px; padding: 2px 6px; font-size: 11px; display: none; }
    .badge[data-count]:not([data-count="0"])::after { display: block; }
    /* Side menu */
    .side-menu { position: fixed; top: 0; left: 0; width: 80%; max-width: 300px; height: 100%; background: #fff; z-index: 30; box-shadow: 2px 0 10px rgba(0,0,0,0.2); transform: translateX(-100%); transition: 0.3s; padding: 20px; display: flex; flex-direction: column; }
    .side-menu.open { transform: translateX(0); }
    .side-menu .close-btn { align-self: flex-end; font-size: 24px; cursor: pointer; }
    .menu-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 25; }
    .overlay.show { display: block; }
    /* Stories */
    .stories { display: flex; gap: 12px; padding: 12px 15px; border-bottom: 1px solid #dbdbdb; overflow-x: auto; background: #fff; }
    .story-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .story-ring { width: 66px; height: 66px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 2px; }
    .story-ring img, .story-ring video { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; object-fit: cover; }
    .story-item span { font-size: 12px; color: #262626; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .story-self .story-ring { background: #ddd; display: flex; align-items: center; justify-content: center; }
    .story-self .story-ring i { color: #0095f6; font-size: 24px; }
    /* Feed */
    .feed { flex: 1; display: flex; flex-direction: column; gap: 20px; padding-bottom: 60px; }
    .post { background: #fff; border: 1px solid #dbdbdb; border-radius: 8px; }
    .post-header { display: flex; align-items: center; gap: 10px; padding: 12px 15px; cursor: pointer; }
    .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .post-header .username { font-weight: 600; font-size: 14px; }
    .post-media { width: 100%; max-height: 500px; object-fit: contain; background: black; }
    .post-actions { padding: 10px 15px; display: flex; gap: 15px; }
    .post-actions i { font-size: 24px; cursor: pointer; }
    .post-actions i.liked { color: #ed4956; }
    .post-likes { padding: 0 15px 5px; font-weight: 600; font-size: 14px; }
    .post-caption { padding: 0 15px 10px; font-size: 14px; }
    .post-caption .username { font-weight: 600; margin-right: 5px; }
    .post-comment-input { display: flex; border-top: 1px solid #efefef; padding: 10px 15px; }
    .post-comment-input input { flex: 1; border: none; outline: none; font-size: 14px; }
    .post-comment-input button { background: none; border: none; color: #0095f6; font-weight: 600; cursor: pointer; }
    /* Profile */
    .profile-header { display: flex; align-items: center; gap: 20px; padding: 20px; border-bottom: 1px solid #dbdbdb; background: #fff; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #0095f6; }
    .profile-info { flex: 1; }
    .profile-info h2 { font-size: 20px; }
    .profile-stats { display: flex; gap: 20px; margin: 10px 0; }
    .profile-stats div { text-align: center; }
    .profile-stats span { font-weight: 600; }
    .profile-bio { margin: 5px 0; color: #262626; }
    .profile-buttons { display: flex; gap: 8px; margin-top: 8px; }
    .btn { padding: 6px 16px; border: 1px solid #dbdbdb; background: transparent; border-radius: 4px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #0095f6; color: white; border: none; }
    .profile-posts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-top: 20px; }
    .profile-post { aspect-ratio: 1/1; object-fit: cover; width: 100%; cursor: pointer; }
    /* Search */
    .search-page { padding: 10px 15px; }
    .search-input { width: 100%; padding: 10px 15px; background: #efefef; border: none; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    .user-list { list-style: none; }
    .user-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .user-item img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .user-item .name { font-weight: 600; flex: 1; }
    /* Bottom nav */
    .bottom-nav { display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #dbdbdb; background: #fff; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; z-index: 10; }
    .bottom-nav i { font-size: 24px; color: #262626; cursor: pointer; }
    .bottom-nav i.active { color: #0095f6; }
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 30; }
    .modal-content { background: #fff; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; max-height: 80%; overflow-y: auto; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 8px; }
    .modal-content button { background: #0095f6; color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; margin-top: 10px; cursor: pointer; }
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #fafafa; }
    #login-screen button { background: #0095f6; color: #fff; border: none; padding: 14px 28px; border-radius: 12px; font-size: 18px; cursor: pointer; }
    .preview-media { max-width: 100%; max-height: 200px; object-fit: contain; margin: 10px 0; border-radius: 8px; display: none; }
    .loader { text-align: center; padding: 20px; color: #8e8e8e; }
    /* Chat */
    .message-row { display: flex; margin: 6px 0; }
    .message-row.sent { justify-content: flex-end; }
    .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 20px; font-size: 15px; word-break: break-word; }
    .sent .message-bubble { background: #0095f6; color: white; }
    .received .message-bubble { background: #efefef; }
  </style>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="login-screen">
    <div style="font-size:48px;font-weight:800;margin-bottom:30px;"><span style="color:#0095f6;">D</span>unukha</div>
    <button id="google-login"><i class="fab fa-google"></i> Đăng nhập với Google</button>
  </div>

  <div id="app">
    <div class="header">
      <i class="fas fa-bars menu-btn" id="menu-btn"></i>
      <div class="logo-text"><span>D</span>unukha</div>
      <div class="header-icons">
        <i class="far fa-paper-plane" id="btn-chat"></i>
        <i class="far fa-bell badge" id="btn-notif" data-count="0"></i>
      </div>
    </div>

    <!-- Side menu -->
    <div class="overlay" id="menu-overlay"></div>
    <div class="side-menu" id="side-menu">
      <i class="fas fa-times close-btn" id="close-menu"></i>
      <div class="menu-item" data-action="profile"><i class="far fa-user-circle"></i> Trang cá nhân</div>
      <div class="menu-item" data-action="edit-profile"><i class="fas fa-pencil-alt"></i> Chỉnh sửa hồ sơ</div>
      <div class="menu-item" data-action="report"><i class="fas fa-flag"></i> Báo cáo vấn đề</div>
      <div class="menu-item" data-action="logout"><i class="fas fa-sign-out-alt"></i> Đăng xuất</div>
    </div>

    <div style="flex:1; overflow-y:auto;">
      <div id="page-home" class="page">
        <div class="stories" id="stories-container"></div>
        <div class="feed" id="feed-container"></div>
        <div class="loader" id="feed-loader" style="display:none;">Đang tải thêm...</div>
      </div>
      <div id="page-search" class="page" style="display:none;">
        <div class="search-page">
          <input class="search-input" id="search-input" placeholder="Tìm kiếm người dùng...">
          <ul class="user-list" id="user-list"></ul>
        </div>
      </div>
      <div id="page-post" class="page" style="display:none;">
        <div style="padding:20px;">
          <h3>Tạo bài viết mới</h3>
          <input type="file" id="post-file" accept="image/*,video/*">
          <img id="post-preview-img" class="preview-media" style="display:none;">
          <video id="post-preview-video" class="preview-media" controls style="display:none;"></video>
          <textarea id="post-caption" placeholder="Caption..."></textarea>
          <button id="btn-submit-post">Đăng</button>
          <hr style="margin:20px 0;">
          <h3>Thêm Story</h3>
          <input type="file" id="story-file" accept="image/*,video/*">
          <img id="story-preview-img" class="preview-media" style="display:none;">
          <video id="story-preview-video" class="preview-media" controls style="display:none;"></video>
          <button id="btn-submit-story">Đăng story</button>
        </div>
      </div>
      <div id="page-notif" class="page" style="display:none;">
        <div style="padding:15px;"><h3>Thông báo</h3><div id="notif-list"></div></div>
      </div>
      <div id="page-profile" class="page" style="display:none;">
        <div id="profile-content"></div>
      </div>
    </div>

    <div class="bottom-nav">
      <i class="fas fa-home active" data-page="home"></i>
      <i class="fas fa-search" data-page="search"></i>
      <i class="far fa-plus-square" data-page="post"></i>
      <i class="far fa-heart" data-page="notif"></i>
      <i class="far fa-user-circle" data-page="profile"></i>
    </div>
  </div>

  <!-- Modals -->
  <div class="modal" id="story-modal">
    <div class="modal-content" style="background:black; color:white; text-align:center;">
      <img id="story-img" style="width:100%; max-height:70vh; object-fit:contain; display:none;">
      <video id="story-video" style="width:100%; max-height:70vh; object-fit:contain; display:none;" controls autoplay loop></video>
      <p id="story-user" style="margin:10px 0;"></p>
      <button id="btn-close-story" style="background:white; color:black;">Đóng</button>
    </div>
  </div>

  <div class="modal" id="chat-modal">
    <div class="modal-content" style="height:90%; display:flex; flex-direction:column;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="chat-username">Chat</h3>
        <button id="btn-back-chat" style="width:auto; background:transparent; color:#0095f6; border:none; font-size:16px;"><i class="fas fa-arrow-left"></i> Quay lại</button>
      </div>
      <div id="chat-list" style="flex:1; overflow-y:auto;"></div>
      <div id="chat-window" style="display:none; flex:1; flex-direction:column;">
        <div id="chat-messages" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #dbdbdb;">
          <input type="text" id="chat-input" placeholder="Nhắn tin..." style="flex:1; border:1px solid #dbdbdb; border-radius:20px; padding:8px 15px;">
          <button id="btn-send-msg" style="background:#0095f6; color:white; border:none; border-radius:50%; width:40px; height:40px; margin-left:8px;"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="edit-profile-modal">
    <div class="modal-content">
      <h3>Chỉnh sửa hồ sơ</h3>
      <input type="text" id="edit-name" placeholder="Tên">
      <textarea id="edit-bio" placeholder="Tiểu sử"></textarea>
      <label>Ảnh đại diện mới:</label>
      <input type="file" id="edit-avatar-file" accept="image/*">
      <img id="edit-avatar-preview" class="preview-media" style="display:none;">
      <button id="btn-save-profile">Lưu</button>
      <button style="background:#ed4956;" id="btn-close-edit">Hủy</button>
    </div>
  </div>

  <div class="modal" id="report-modal">
    <div class="modal-content">
      <h3>Báo cáo vấn đề</h3>
      <textarea id="report-text" placeholder="Mô tả..."></textarea>
      <button id="btn-submit-report">Gửi</button>
      <button style="background:#ed4956;" id="btn-close-report">Hủy</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where, getDocs, setDoc, getDoc, limit, startAfter, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // 🔥 Config
    const firebaseConfig = {
      apiKey: "AIzaSyBJ3DAWyschGA6fM5VmBndLI0cGSaFF46U",
      authDomain: "dunukhasite.firebaseapp.com",
      projectId: "dunukhasite",
      storageBucket: "dunukhasite.firebasestorage.app",
      messagingSenderId: "841226738327",
      appId: "1:841226738327:web:5e0192799adbe1179067d2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let currentChatUser = null;
    let unsubscribes = {};
    let lastPostDoc = null;
    let isLoadingPosts = false;

    // ========== AUTH ==========
    document.getElementById('google-login').addEventListener('click', async () => {
      try { await signInWithPopup(auth, provider); } catch (e) { alert("Lỗi đăng nhập: " + e.message); }
    });

    onAuthStateChanged(auth, user => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        ensureUserDoc(user);
        navigateTo('home');
        listenNotifications();
      } else {
        currentUser = null;
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        Object.values(unsubscribes).forEach(u => u());
        unsubscribes = {};
      }
    });

    async function ensureUserDoc(user) {
      const ref = doc(db, "users", user.uid);
      if (!(await getDoc(ref)).exists()) {
        await setDoc(ref, {
          displayName: user.displayName || "Người dùng",
          email: user.email,
          photoURL: user.photoURL || "https://via.placeholder.com/150",
          bio: "",
          followers: {},
          following: {},
          createdAt: serverTimestamp()
        });
      }
    }

    // ========== MENU & NAV ==========
    const menuBtn = document.getElementById('menu-btn');
    const closeMenu = document.getElementById('close-menu');
    const sideMenu = document.getElementById('side-menu');
    const overlay = document.getElementById('menu-overlay');
    menuBtn.addEventListener('click', () => { sideMenu.classList.add('open'); overlay.classList.add('show'); });
    closeMenu.addEventListener('click', () => { sideMenu.classList.remove('open'); overlay.classList.remove('show'); });
    overlay.addEventListener('click', () => { sideMenu.classList.remove('open'); overlay.classList.remove('show'); });
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const action = item.dataset.action;
        sideMenu.classList.remove('open'); overlay.classList.remove('show');
        if (action === 'profile') navigateTo('profile');
        else if (action === 'edit-profile') openEditProfile();
        else if (action === 'report') document.getElementById('report-modal').style.display = 'flex';
        else if (action === 'logout') { if (confirm("Đăng xuất?")) signOut(auth); }
      });
    });

    const navIcons = document.querySelectorAll('.bottom-nav i');
    const pages = {
      home: document.getElementById('page-home'),
      search: document.getElementById('page-search'),
      post: document.getElementById('page-post'),
      notif: document.getElementById('page-notif'),
      profile: document.getElementById('page-profile')
    };
    navIcons.forEach(icon => icon.addEventListener('click', () => navigateTo(icon.dataset.page)));

    function navigateTo(page) {
      navIcons.forEach(i => i.classList.remove('active'));
      document.querySelector(`.bottom-nav i[data-page="${page}"]`).classList.add('active');
      Object.values(pages).forEach(p => p.style.display = 'none');
      pages[page].style.display = 'block';
      if (page !== 'home' && unsubscribes['feed']) { unsubscribes['feed'](); delete unsubscribes['feed']; }
      if (page === 'home') { loadStories(); loadFeed(); }
      else if (page === 'search') { document.getElementById('search-input').value = ''; document.getElementById('user-list').innerHTML = ''; }
      else if (page === 'profile') loadProfile(currentUser.uid);
    }

    // ========== UPLOAD ==========
    async function uploadFile(file, path) {
      const storageRef = ref(storage, path);
      const task = uploadBytesResumable(storageRef, file);
      return new Promise((resolve, reject) => {
        task.on('state_changed', null, reject, async () => resolve(await getDownloadURL(task.snapshot.ref)));
      });
    }
    function isVideo(file) { return file.type.startsWith('video/'); }
    function setPreview(inputFile, imgEl, videoEl) {
      const file = inputFile.files[0];
      if (!file) return;
      if (isVideo(file)) {
        videoEl.src = URL.createObjectURL(file); videoEl.style.display = 'block'; imgEl.style.display = 'none';
      } else {
        imgEl.src = URL.createObjectURL(file); imgEl.style.display = 'block'; videoEl.style.display = 'none';
      }
    }

    // ========== STORIES ==========
    async function loadStories() {
      const container = document.getElementById('stories-container');
      container.innerHTML = '';
      const now = new Date();
      const snap = await getDocs(query(collection(db, "stories"), orderBy("expiresAt", "desc")));
      const users = {};
      snap.forEach(doc => {
        const d = doc.data();
        if (d.expiresAt.toDate() > now) {
          if (!users[d.uid]) users[d.uid] = { ...d, stories: [] };
          users[d.uid].stories.push(d);
        }
      });
      for (const uid in users) {
        const u = users[uid];
        const userDoc = await getDoc(doc(db, "users", uid));
        if (!userDoc.exists()) continue;
        const userData = userDoc.data();
        const div = document.createElement('div');
        div.className = 'story-item';
        const thumb = u.stories[0].mediaType === 'video' 
          ? `<video src="${u.stories[0].mediaUrl}" muted autoplay loop style="width:100%;height:100%;object-fit:cover;"></video>`
          : `<img src="${u.stories[0].mediaUrl}">`;
        div.innerHTML = `<div class="story-ring">${thumb}</div><span>${userData.displayName}</span>`;
        div.addEventListener('click', () => viewStory(u.stories));
        container.appendChild(div);
      }
      const myDiv = document.createElement('div');
      myDiv.className = 'story-item story-self';
      myDiv.innerHTML = `<div class="story-ring"><i class="fas fa-plus"></i></div><span>Bạn</span>`;
      myDiv.addEventListener('click', () => navigateTo('post'));
      container.appendChild(myDiv);
    }

    function viewStory(stories) {
      let index = 0;
      const modal = document.getElementById('story-modal');
      modal.style.display = 'flex';
      const img = document.getElementById('story-img');
      const video = document.getElementById('story-video');
      const userP = document.getElementById('story-user');
      img.style.display = 'none'; video.style.display = 'none';
      const show = () => {
        const s = stories[index];
        userP.textContent = s.username;
        if (s.mediaType === 'video') {
          video.src = s.mediaUrl; video.style.display = 'block'; video.play();
          img.style.display = 'none';
        } else {
          img.src = s.mediaUrl; img.style.display = 'block';
          video.style.display = 'none';
        }
      };
      show();
      const timer = setInterval(() => {
        index++;
        if (index >= stories.length) { clearInterval(timer); modal.style.display = 'none'; video.pause(); }
        else show();
      }, 5000);
      document.getElementById('btn-close-story').onclick = () => { clearInterval(timer); modal.style.display = 'none'; video.pause(); };
    }

    // ========== FEED ==========
    function loadFeed() { document.getElementById('feed-container').innerHTML = ''; lastPostDoc = null; fetchPosts(); }
    async function fetchPosts() {
      if (isLoadingPosts) return;
      isLoadingPosts = true;
      document.getElementById('feed-loader').style.display = 'block';
      const q = lastPostDoc 
        ? query(collection(db, "posts"), orderBy("createdAt", "desc"), startAfter(lastPostDoc), limit(5))
        : query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(5));
      const snap = await getDocs(q);
      if (!snap.empty) {
        snap.forEach(doc => { renderPost(doc.data(), doc.id); lastPostDoc = doc; });
      } else {
        document.getElementById('feed-loader').textContent = 'Không còn bài viết.';
      }
      isLoadingPosts = false;
      document.getElementById('feed-loader').style.display = 'none';
    }

    const scrollArea = document.querySelector('#app > div:nth-child(3)');
    scrollArea.addEventListener('scroll', () => {
      if (scrollArea.scrollHeight - scrollArea.scrollTop - scrollArea.clientHeight < 100 && document.getElementById('page-home').style.display === 'block') {
        fetchPosts();
      }
    });

    function renderPost(post, id) {
      const liked = post.likes?.includes(currentUser.uid);
      const div = document.createElement('div');
      div.className = 'post';
      const media = post.mediaType === 'video' 
        ? `<video class="post-media" src="${post.mediaUrl}" controls playsinline></video>`
        : `<img class="post-media" src="${post.mediaUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/400'">`;
      div.innerHTML = `
        <div class="post-header" data-uid="${post.uid}"><img src="${post.userAvatar || 'https://via.placeholder.com/32'}"><span class="username">${post.username}</span></div>
        ${media}
        <div class="post-actions">
          <i class="${liked ? 'fas fa-heart liked' : 'far fa-heart'}" data-id="${id}"></i>
          <i class="far fa-comment"></i>
          <i class="far fa-paper-plane" id="share-${id}"></i>
        </div>
        <div class="post-likes">${post.likes?.length || 0} lượt thích</div>
        <div class="post-caption"><span class="username">${post.username}</span> ${post.caption}</div>
        <div class="post-comment-input">
          <input placeholder="Thêm bình luận..." id="comment-${id}">
          <button class="send-comment" data-id="${id}">Đăng</button>
        </div>
      `;
      document.getElementById('feed-container').appendChild(div);

      div.querySelector('.post-header').addEventListener('click', () => loadProfile(post.uid));
      div.querySelector('[data-id]').addEventListener('click', async (e) => {
        const ref = doc(db, "posts", id);
        if (liked) await updateDoc(ref, { likes: arrayRemove(currentUser.uid) });
        else {
          await updateDoc(ref, { likes: arrayUnion(currentUser.uid) });
          if (post.uid !== currentUser.uid) addNotification(post.uid, 'like', `${currentUser.displayName} đã thích bài viết của bạn`);
        }
      });
      div.querySelector(`#share-${id}`).addEventListener('click', () => {
        if (navigator.share) navigator.share({ title: 'Dunukha', text: post.caption, url: post.mediaUrl });
        else prompt("Copy link:", post.mediaUrl);
      });
      div.querySelector('.send-comment').addEventListener('click', async () => {
        const input = document.getElementById(`comment-${id}`);
        const text = input.value.trim();
        if (!text) return;
        await updateDoc(doc(db, "posts", id), {
          comments: arrayUnion({ uid: currentUser.uid, username: currentUser.displayName, text, createdAt: new Date().toISOString() })
        });
        if (post.uid !== currentUser.uid) addNotification(post.uid, 'comment', `${currentUser.displayName} đã bình luận: "${text}"`);
        input.value = '';
      });
    }

    // ========== POST UPLOAD ==========
    document.getElementById('post-file').addEventListener('change', function() {
      setPreview(this, document.getElementById('post-preview-img'), document.getElementById('post-preview-video'));
    });
    document.getElementById('btn-submit-post').addEventListener('click', async () => {
      const file = document.getElementById('post-file').files[0];
      const caption = document.getElementById('post-caption').value.trim();
      if (!file) return alert("Chọn ảnh/video");
      try {
        const userData = (await getDoc(doc(db, "users", currentUser.uid))).data();
        const path = `posts/${currentUser.uid}_${Date.now()}_${file.name}`;
        const mediaUrl = await uploadFile(file, path);
        await addDoc(collection(db, "posts"), {
          uid: currentUser.uid,
          username: userData.displayName,
          userAvatar: userData.photoURL || currentUser.photoURL,
          mediaUrl,
          mediaType: isVideo(file) ? 'video' : 'image',
          caption,
          likes: [],
          comments: [],
          createdAt: serverTimestamp()
        });
        document.getElementById('post-file').value = '';
        document.getElementById('post-preview-img').style.display = 'none';
        document.getElementById('post-preview-video').style.display = 'none';
        document.getElementById('post-caption').value = '';
        alert("Đã đăng bài!");
        navigateTo('home');
      } catch (e) { alert("Lỗi đăng bài: " + e.message); }
    });

    document.getElementById('story-file').addEventListener('change', function() {
      setPreview(this, document.getElementById('story-preview-img'), document.getElementById('story-preview-video'));
    });
    document.getElementById('btn-submit-story').addEventListener('click', async () => {
      const file = document.getElementById('story-file').files[0];
      if (!file) return alert("Chọn ảnh/video cho story");
      try {
        const path = `stories/${currentUser.uid}_${Date.now()}_${file.name}`;
        const mediaUrl = await uploadFile(file, path);
        const expiresAt = new Date(Date.now() + 24 * 60 * 60 * 1000);
        await addDoc(collection(db, "stories"), {
          uid: currentUser.uid,
          username: currentUser.displayName || "Người dùng",
          mediaUrl,
          mediaType: isVideo(file) ? 'video' : 'image',
          createdAt: serverTimestamp(),
          expiresAt: Timestamp.fromDate(expiresAt)
        });
        document.getElementById('story-file').value = '';
        document.getElementById('story-preview-img').style.display = 'none';
        document.getElementById('story-preview-video').style.display = 'none';
        alert("Đã đăng story!");
        navigateTo('home');
      } catch (e) { alert("Lỗi đăng story: " + e.message); }
    });

    // ========== PROFILE ==========
    async function loadProfile(uid) {
      const container = document.getElementById('profile-content');
      container.innerHTML = 'Đang tải...';
      const ref = doc(db, "users", uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) { container.innerHTML = 'Không tồn tại'; return; }
      const data = snap.data();
      const isMe = uid === currentUser.uid;
      const isFollowing = data.followers?.[currentUser.uid];
      container.innerHTML = `
        <div class="profile-header">
          <img class="profile-avatar" src="${data.photoURL || 'https://via.placeholder.com/150'}">
          <div class="profile-info">
            <h2>${data.displayName}</h2>
            <div class="profile-stats">
              <div><span>${Object.keys(data.followers||{}).length}</span> followers</div>
              <div><span>${Object.keys(data.following||{}).length}</span> following</div>
            </div>
            <div class="profile-bio">${data.bio || ''}</div>
            <div class="profile-buttons">
              ${isMe ? `<button class="btn" id="edit-profile-btn">Chỉnh sửa hồ sơ</button>` : `<button class="btn btn-primary" id="follow-btn">${isFollowing ? 'Bỏ theo dõi' : 'Theo dõi'}</button>`}
            </div>
          </div>
        </div>
        <div class="profile-posts" id="profile-posts"></div>
      `;
      const postsQ = query(collection(db, "posts"), where("uid", "==", uid), orderBy("createdAt", "desc"), limit(12));
      const postsSnap = await getDocs(postsQ);
      const postsDiv = document.getElementById('profile-posts');
      postsSnap.forEach(doc => {
        const d = doc.data();
        const el = document.createElement(d.mediaType === 'video' ? 'video' : 'img');
        el.src = d.mediaUrl;
        el.className = 'profile-post';
        el.onclick = () => alert(d.caption);
        if (d.mediaType === 'video') el.muted = true;
        postsDiv.appendChild(el);
      });
      if (isMe) document.getElementById('edit-profile-btn').addEventListener('click', openEditProfile);
      else document.getElementById('follow-btn').addEventListener('click', () => toggleFollow(uid));
    }

    async function openEditProfile() {
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      const data = snap.data();
      document.getElementById('edit-name').value = data.displayName;
      document.getElementById('edit-bio').value = data.bio || '';
      document.getElementById('edit-avatar-file').value = '';
      document.getElementById('edit-avatar-preview').style.display = 'none';
      document.getElementById('edit-profile-modal').style.display = 'flex';
    }

    document.getElementById('edit-avatar-file').addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('edit-avatar-preview').src = e.target.result;
          document.getElementById('edit-avatar-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('btn-save-profile').addEventListener('click', async () => {
      const name = document.getElementById('edit-name').value.trim();
      const bio = document.getElementById('edit-bio').value.trim();
      const avatarFile = document.getElementById('edit-avatar-file').files[0];
      if (!name) return alert("Tên không được để trống");
      const updates = { displayName: name, bio };
      if (avatarFile) {
        try {
          const path = `avatars/${currentUser.uid}_${Date.now()}_${avatarFile.name}`;
          updates.photoURL = await uploadFile(avatarFile, path);
        } catch (e) { alert("Lỗi upload avatar: " + e.message); return; }
      }
      await updateDoc(doc(db, "users", currentUser.uid), updates);
      document.getElementById('edit-profile-modal').style.display = 'none';
      loadProfile(currentUser.uid);
    });
    document.getElementById('btn-close-edit').addEventListener('click', () => document.getElementById('edit-profile-modal').style.display = 'none');

    async function toggleFollow(uid) {
      const myRef = doc(db, "users", currentUser.uid);
      const targetRef = doc(db, "users", uid);
      const targetSnap = await getDoc(targetRef);
      const isFollow = targetSnap.data().followers?.[currentUser.uid];
      if (isFollow) {
        await updateDoc(targetRef, { [`followers.${currentUser.uid}`]: false });
        await updateDoc(myRef, { [`following.${uid}`]: false });
      } else {
        await updateDoc(targetRef, { [`followers.${currentUser.uid}`]: true });
        await updateDoc(myRef, { [`following.${uid}`]: true });
        addNotification(uid, 'follow', `${currentUser.displayName} đã theo dõi bạn`);
      }
      loadProfile(uid);
    }

    // ========== SEARCH (tải toàn bộ users, lọc client-side để tránh index) ==========
    let allUsersCache = null;
    document.getElementById('search-input').addEventListener('input', async (e) => {
      const kw = e.target.value.trim().toLowerCase();
      const list = document.getElementById('user-list');
      if (!kw) { list.innerHTML = ''; return; }
      if (!allUsersCache) {
        list.innerHTML = 'Đang tải danh sách người dùng...';
        const snap = await getDocs(collection(db, "users"));
        allUsersCache = [];
        snap.forEach(doc => {
          if (doc.id !== currentUser.uid) allUsersCache.push({ id: doc.id, ...doc.data() });
        });
      }
      list.innerHTML = '';
      const filtered = allUsersCache.filter(u => u.displayName.toLowerCase().includes(kw));
      if (filtered.length === 0) list.innerHTML = 'Không tìm thấy.';
      else filtered.forEach(u => {
        const li = document.createElement('li');
        li.className = 'user-item';
        li.innerHTML = `<img src="${u.photoURL || 'https://via.placeholder.com/44'}"><span class="name">${u.displayName}</span>`;
        li.addEventListener('click', () => loadProfile(u.id));
        list.appendChild(li);
      });
    });

    // ========== NOTIFICATIONS ==========
    function listenNotifications() {
      const q = query(collection(db, "notifications"), where("to", "==", currentUser.uid), orderBy("createdAt", "desc"), limit(20));
      onSnapshot(q, snap => {
        let count = 0;
        const notifList = document.getElementById('notif-list');
        if (notifList) notifList.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          if (!d.read) count++;
          if (notifList) {
            const p = document.createElement('p');
            p.textContent = d.message + ' (' + new Date(d.createdAt?.toDate()).toLocaleTimeString() + ')';
            notifList.appendChild(p);
          }
        });
        document.getElementById('btn-notif').dataset.count = count;
      });
    }

    async function addNotification(to, type, message) {
      await addDoc(collection(db, "notifications"), { to, from: currentUser.uid, type, message, read: false, createdAt: serverTimestamp() });
    }

    // ========== CHAT ==========
    document.getElementById('btn-chat').addEventListener('click', () => {
      document.getElementById('chat-modal').style.display = 'flex';
      loadChatList();
    });
    document.getElementById('chat-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) document.getElementById('chat-modal').style.display = 'none';
    });

    async function loadChatList() {
      const chatList = document.getElementById('chat-list');
      const chatWindow = document.getElementById('chat-window');
      chatList.style.display = 'block'; chatWindow.style.display = 'none';
      const mySnap = await getDoc(doc(db, "users", currentUser.uid));
      const following = mySnap.data()?.following || {};
      chatList.innerHTML = '';
      for (const uid in following) {
        if (!following[uid]) continue;
        const userSnap = await getDoc(doc(db, "users", uid));
        if (!userSnap.exists()) continue;
        const data = userSnap.data();
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `<img src="${data.photoURL || 'https://via.placeholder.com/44'}"><span class="name">${data.displayName}</span>`;
        div.addEventListener('click', () => openChat(uid, data.displayName));
        chatList.appendChild(div);
      }
    }

    function openChat(uid, name) {
      currentChatUser = uid;
      document.getElementById('chat-list').style.display = 'none';
      document.getElementById('chat-window').style.display = 'flex';
      document.getElementById('chat-username').textContent = name;
      loadMessages();
    }

    function loadMessages() {
      const chatId = [currentUser.uid, currentChatUser].sort().join('_');
      if (unsubscribes[chatId]) unsubscribes[chatId]();
      const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("createdAt"), limit(30));
      unsubscribes[chatId] = onSnapshot(q, snap => {
        const container = document.getElementById('chat-messages');
        container.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          const row = document.createElement('div');
          row.className = `message-row ${d.from === currentUser.uid ? 'sent' : 'received'}`;
          row.innerHTML = `<div class="message-bubble">${d.text}</div>`;
          container.appendChild(row);
        });
        container.scrollTop = container.scrollHeight;
      });
    }

    document.getElementById('btn-send-msg').addEventListener('click', async () => {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !currentChatUser) return;
      const chatId = [currentUser.uid, currentChatUser].sort().join('_');
      await addDoc(collection(db, "messages"), { chatId, from: currentUser.uid, to: currentChatUser, text, createdAt: serverTimestamp() });
      input.value = '';
    });

    document.getElementById('btn-back-chat').addEventListener('click', loadChatList);

    // ========== REPORT ==========
    document.getElementById('btn-submit-report').addEventListener('click', async () => {
      const text = document.getElementById('report-text').value.trim();
      if (!text) return alert("Nhập nội dung báo cáo");
      await addDoc(collection(db, "reports"), {
        uid: currentUser.uid,
        email: currentUser.email,
        message: text,
        createdAt: serverTimestamp()
      });
      document.getElementById('report-text').value = '';
      document.getElementById('report-modal').style.display = 'none';
      alert("Đã gửi báo cáo!");
    });
    document.getElementById('btn-close-report').addEventListener('click', () => document.getElementById('report-modal').style.display = 'none');
  </script>
</body>
</html>
