<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dunukha Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background: #fafafa; display: flex; justify-content: center; }
    #app { max-width: 500px; width: 100%; background: #fff; min-height: 100vh; display: none; flex-direction: column; position: relative; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #dbdbdb; background: #fff; position: sticky; top: 0; z-index: 10; }
    .logo-text { font-size: 26px; font-weight: 700; color: #262626; letter-spacing: 1px; font-family: 'Segoe UI', cursive; }
    .logo-text span { color: #0095f6; }
    .header .icons i { font-size: 22px; margin-left: 18px; cursor: pointer; position: relative; }
    .badge { position: absolute; top: -8px; right: -10px; background: #ed4956; color: white; border-radius: 50%; padding: 2px 6px; font-size: 11px; display: none; }
    .tabs { display: flex; justify-content: space-around; border-bottom: 1px solid #dbdbdb; background: #fff; }
    .tab { flex: 1; text-align: center; padding: 10px 0; font-weight: 500; font-size: 14px; color: #8e8e8e; cursor: pointer; }
    .tab.active { color: #0095f6; border-bottom: 2px solid #0095f6; }
    .tab-content { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
    .tab-content.active { display: flex; }
    /* Story */
    .stories { display: flex; gap: 12px; padding: 12px 15px; border-bottom: 1px solid #dbdbdb; overflow-x: auto; background: #fff; }
    .story { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .story .avatar-ring { width: 66px; height: 66px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 2.5px; }
    .story .avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; object-fit: cover; }
    .story span { font-size: 12px; color: #262626; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* Feed */
    .feed { flex: 1; display: flex; flex-direction: column; gap: 20px; padding-bottom: 60px; }
    .post { background: #fff; border: 1px solid #dbdbdb; border-radius: 4px; }
    .post-header { display: flex; align-items: center; gap: 10px; padding: 12px 15px; cursor: pointer; }
    .post-header .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .post-header .username { font-weight: 600; font-size: 14px; }
    .post-image { width: 100%; height: auto; max-height: 500px; object-fit: cover; }
    .post-actions { padding: 10px 15px; display: flex; gap: 15px; }
    .post-actions i { font-size: 24px; cursor: pointer; }
    .post-actions i.liked { color: #ed4956; }
    .post-likes { padding: 0 15px 5px; font-weight: 600; font-size: 14px; }
    .post-caption { padding: 0 15px 10px; font-size: 14px; }
    .post-caption .username { font-weight: 600; margin-right: 5px; }
    .post-comment-input { display: flex; border-top: 1px solid #efefef; padding: 10px 15px; }
    .post-comment-input input { flex: 1; border: none; outline: none; font-size: 14px; }
    .post-comment-input button { background: none; border: none; color: #0095f6; font-weight: 600; cursor: pointer; }
    /* Profile */
    .profile { padding: 20px; }
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
    .profile-info h2 { font-size: 20px; margin-bottom: 5px; }
    .profile-stats { display: flex; gap: 20px; margin: 10px 0; }
    .profile-stats div { text-align: center; cursor: pointer; }
    .edit-profile { background: #efefef; border: none; padding: 6px 12px; border-radius: 4px; font-weight: 600; cursor: pointer; }
    .profile-posts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
    .profile-post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; }
    /* Search */
    .search-bar { padding: 10px 15px; border-bottom: 1px solid #dbdbdb; }
    .search-bar input { width: 100%; padding: 8px 12px; background: #efefef; border: none; border-radius: 6px; }
    .user-item { display: flex; align-items: center; gap: 12px; padding: 10px 15px; border-bottom: 1px solid #f0f0f0; }
    .user-item img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .follow-btn { margin-left: auto; background: #0095f6; color: white; border: none; padding: 6px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .follow-btn.following { background: #efefef; color: #262626; }
    /* Chat */
    .chat-list { flex: 1; overflow-y: auto; }
    .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .chat-item img { width: 44px; height: 44px; border-radius: 50%; }
    .chat-window { display: none; flex: 1; flex-direction: column; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 10px; }
    .message { margin: 6px 0; display: flex; }
    .message.sent { justify-content: flex-end; }
    .message-bubble { max-width: 80%; padding: 8px 12px; border-radius: 18px; font-size: 14px; }
    .message.sent .message-bubble { background: #0095f6; color: white; }
    .message.received .message-bubble { background: #efefef; }
    .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #dbdbdb; }
    .chat-input-area input { flex: 1; border: 1px solid #dbdbdb; border-radius: 20px; padding: 8px 15px; }
    .chat-input-area button { background: #0095f6; color: white; border: none; border-radius: 50%; width: 36px; height: 36px; margin-left: 8px; cursor: pointer; }
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 20; }
    .modal-content { background: #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; max-height: 80%; overflow-y: auto; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 4px; }
    .modal-content button { background: #0095f6; color: #fff; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 5px; }
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #fafafa; }
    #login-screen button { background: #0095f6; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  </style>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="login-screen">
    <div style="font-size:42px;font-weight:700;margin-bottom:20px;"><span style="color:#0095f6;">D</span>unukha</div>
    <button id="google-login"><i class="fab fa-google"></i> Đăng nhập với Google</button>
  </div>

  <div id="app">
    <div class="header">
      <div class="logo-text"><span>D</span>unukha</div>
      <div class="icons">
        <i class="far fa-paper-plane" id="btn-chat" title="Nhắn tin"></i>
        <i class="far fa-bell" id="btn-notifications" title="Thông báo"><span class="badge" id="notif-badge">0</span></i>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="home">🏠 Home</div>
      <div class="tab" data-tab="search">🔍 Search</div>
      <div class="tab" data-tab="add-post">+ Post</div>
      <div class="tab" data-tab="profile">👤 Profile</div>
    </div>

    <!-- Tab Home -->
    <div class="tab-content active" id="tab-home">
      <div class="stories" id="stories-container"></div>
      <div class="feed" id="feed-container"></div>
    </div>

    <!-- Tab Search -->
    <div class="tab-content" id="tab-search">
      <div class="search-bar"><input type="text" id="search-input" placeholder="Tìm kiếm người dùng..."></div>
      <div id="user-list"></div>
    </div>

    <!-- Tab Add Post -->
    <div class="tab-content" id="tab-add-post">
      <div style="padding:20px;">
        <h3>Tạo bài viết</h3>
        <input type="text" id="post-image-url" placeholder="Link ảnh">
        <textarea id="post-caption" placeholder="Caption"></textarea>
        <button id="btn-submit-post">Đăng</button>
        <hr style="margin:20px 0;">
        <h3>Đăng Story (24h)</h3>
        <input type="text" id="story-image-url" placeholder="Link ảnh cho story">
        <button id="btn-submit-story">Đăng story</button>
      </div>
    </div>

    <!-- Tab Profile -->
    <div class="tab-content" id="tab-profile">
      <div class="profile" id="profile-content"></div>
    </div>
  </div>

  <!-- Modal Xem story -->
  <div class="modal" id="story-modal">
    <div class="modal-content" style="text-align:center;">
      <img id="story-modal-img" style="width:100%; max-height:70vh; object-fit:contain;">
      <p id="story-modal-user" style="margin:10px 0;"></p>
      <button id="btn-close-story">Đóng</button>
    </div>
  </div>

  <!-- Modal Thông báo -->
  <div class="modal" id="notif-modal">
    <div class="modal-content">
      <h3>Thông báo</h3>
      <div id="notif-list"></div>
      <button id="btn-close-notif">Đóng</button>
    </div>
  </div>

  <!-- Modal Edit Profile -->
  <div class="modal" id="edit-profile-modal">
    <div class="modal-content">
      <h3>Chỉnh sửa</h3>
      <input type="text" id="edit-name" placeholder="Tên">
      <input type="text" id="edit-bio" placeholder="Bio">
      <input type="text" id="edit-avatar" placeholder="Link avatar">
      <button id="btn-save-profile">Lưu</button>
      <button style="background:#ed4956;" id="btn-close-edit-modal">Hủy</button>
    </div>
  </div>

  <!-- Khung Chat -->
  <div class="modal" id="chat-modal">
    <div class="modal-content" style="height:90%; display:flex; flex-direction:column;">
      <div style="display:flex; justify-content:space-between;">
        <h3 id="chat-username">Chat</h3>
        <button id="btn-back-chat-list" style="width:auto; background:transparent; color:#0095f6; border:none; font-size:16px;"><i class="fas fa-arrow-left"></i> Quay lại</button>
      </div>
      <div class="chat-list" id="chat-list"></div>
      <div class="chat-window" id="chat-window">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="chat-input" placeholder="Nhập tin nhắn...">
          <button id="btn-send-message"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where, getDocs, setDoc, getDoc, limit, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔁 THAY THẾ CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY
    const firebaseConfig = {
      apiKey: "AIzaSyBJ3DAWyschGA6fM5VmBndLI0cGSaFF46U",
      authDomain: "dunukhasite.firebaseapp.com",
      projectId: "dunukhasite",
      storageBucket: "dunukhasite.firebasestorage.app",
      messagingSenderId: "841226738327",
      appId: "1:841226738327:web:5e0192799adbe1179067d2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let currentChatUser = null;
    let unsubscribes = {};

    // Elements
    const loginScreen = document.getElementById('login-screen');
    const appDiv = document.getElementById('app');
    const storiesContainer = document.getElementById('stories-container');
    const feedContainer = document.getElementById('feed-container');
    const notifBadge = document.getElementById('notif-badge');
    const notifList = document.getElementById('notif-list');
    const storyModal = document.getElementById('story-modal');
    const notifModal = document.getElementById('notif-modal');
    const chatModal = document.getElementById('chat-modal');
    const chatListDiv = document.getElementById('chat-list');
    const chatWindow = document.getElementById('chat-window');
    const chatMessages = document.getElementById('chat-messages');
    const chatUsername = document.getElementById('chat-username');

    // ================= AUTH =================
    document.getElementById('google-login').addEventListener('click', async () => {
      try { await signInWithPopup(auth, provider); } catch (e) { alert("Lỗi đăng nhập: " + e.message); }
    });

    onAuthStateChanged(auth, user => {
      if (user) {
        currentUser = user;
        loginScreen.style.display = 'none';
        appDiv.style.display = 'flex';
        ensureUserDoc(user);
        switchTab('home');
        listenNotifications();
      } else {
        currentUser = null;
        loginScreen.style.display = 'flex';
        appDiv.style.display = 'none';
        // Reset giao diện
      }
    });

    async function ensureUserDoc(user) {
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          displayName: user.displayName || "Người dùng",
          email: user.email,
          photoURL: user.photoURL || "https://via.placeholder.com/150",
          bio: "",
          followers: {},
          following: {},
          createdAt: serverTimestamp()
        });
      }
    }

    // ================= TABS =================
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');

      if (tab === 'home') { loadStories(); loadFeed(); }
      else if (tab === 'search') document.getElementById('search-input').value = '';
      else if (tab === 'profile') loadProfile(currentUser.uid);
    }

    // ================= STORIES =================
    async function loadStories() {
      storiesContainer.innerHTML = '';
      const now = new Date();
      const q = query(collection(db, "stories"), where("expiresAt", ">", now), orderBy("expiresAt", "desc"));
      const snap = await getDocs(q);
      const usersStories = {};
      snap.forEach(doc => {
        const data = doc.data();
        if (!usersStories[data.uid]) usersStories[data.uid] = { ...data, stories: [] };
        usersStories[data.uid].stories.push(data);
      });

      for (const uid in usersStories) {
        const u = usersStories[uid];
        const userDoc = await getDoc(doc(db, "users", uid));
        if (!userDoc.exists()) continue;
        const userData = userDoc.data();
        const div = document.createElement('div');
        div.className = 'story';
        div.innerHTML = `
          <div class="avatar-ring"><img class="avatar" src="${userData.photoURL}" onerror="this.src='https://via.placeholder.com/66'"></div>
          <span>${userData.displayName}</span>
        `;
        div.addEventListener('click', () => viewStory(u.stories));
        storiesContainer.appendChild(div);
      }

      // Thêm nút đăng story của mình
      const myDiv = document.createElement('div');
      myDiv.className = 'story';
      myDiv.innerHTML = `<div class="avatar-ring" style="background:#ddd;"><i class="fas fa-plus" style="font-size:24px;color:#0095f6;display:flex;align-items:center;justify-content:center;height:100%;"></i></div><span>Bạn</span>`;
      myDiv.addEventListener('click', () => switchTab('add-post')); // chuyển qua tab đăng story
      storiesContainer.appendChild(myDiv);
    }

    function viewStory(stories) {
      if (!stories.length) return;
      let index = 0;
      storyModal.style.display = 'flex';
      const img = document.getElementById('story-modal-img');
      const userP = document.getElementById('story-modal-user');
      const update = () => {
        const s = stories[index];
        img.src = s.imageUrl;
        userP.textContent = s.username || "Story";
      };
      update();
      const timer = setInterval(() => {
        index++;
        if (index >= stories.length) {
          clearInterval(timer);
          storyModal.style.display = 'none';
        } else update();
      }, 3000);
      document.getElementById('btn-close-story').onclick = () => {
        clearInterval(timer);
        storyModal.style.display = 'none';
      };
    }

    document.getElementById('btn-submit-story').addEventListener('click', async () => {
      const url = document.getElementById('story-image-url').value.trim();
      if (!url) return alert("Cần link ảnh");
      const expiresAt = new Date(Date.now() + 24 * 60 * 60 * 1000);
      await addDoc(collection(db, "stories"), {
        uid: currentUser.uid,
        username: currentUser.displayName || "Người dùng",
        imageUrl: url,
        createdAt: serverTimestamp(),
        expiresAt: Timestamp.fromDate(expiresAt)
      });
      document.getElementById('story-image-url').value = '';
      alert("Đã đăng story!");
      switchTab('home');
    });

    // ================= FEED =================
    function loadFeed() {
      feedContainer.innerHTML = '';
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      onSnapshot(q, snapshot => {
        feedContainer.innerHTML = '';
        snapshot.forEach(doc => renderPost(doc.data(), doc.id));
      });
    }

    function renderPost(post, id) {
      const liked = post.likes?.includes(currentUser.uid);
      const div = document.createElement('div');
      div.className = 'post';
      div.innerHTML = `
        <div class="post-header" data-uid="${post.uid}"><img class="avatar" src="${post.userAvatar}"><span class="username">${post.username}</span></div>
        <img class="post-image" src="${post.imageUrl}">
        <div class="post-actions">
          <i class="${liked ? 'fas fa-heart liked' : 'far fa-heart'}" data-id="${id}"></i>
          <i class="far fa-comment"></i>
        </div>
        <div class="post-likes">${post.likes?.length || 0} lượt thích</div>
        <div class="post-caption"><span class="username">${post.username}</span> ${post.caption}</div>
        <div class="post-comment-input"><input placeholder="Bình luận..." id="comment-${id}"><button class="send-comment" data-id="${id}">Đăng</button></div>
      `;
      feedContainer.appendChild(div);

      div.querySelector('.post-header').addEventListener('click', () => loadProfile(post.uid));
      div.querySelector('[data-id]').addEventListener('click', async (e) => {
        const ref = doc(db, "posts", id);
        if (liked) await updateDoc(ref, { likes: arrayRemove(currentUser.uid) });
        else {
          await updateDoc(ref, { likes: arrayUnion(currentUser.uid) });
          if (post.uid !== currentUser.uid) addNotification(post.uid, 'like', `${currentUser.displayName} đã thích bài viết của bạn`);
        }
      });
      div.querySelector('.send-comment').addEventListener('click', async () => {
        const input = document.getElementById(`comment-${id}`);
        const text = input.value.trim();
        if (!text) return;
        await updateDoc(doc(db, "posts", id), { comments: arrayUnion({ uid: currentUser.uid, username: currentUser.displayName, text, createdAt: new Date().toISOString() }) });
        if (post.uid !== currentUser.uid) addNotification(post.uid, 'comment', `${currentUser.displayName} đã bình luận: "${text}"`);
        input.value = '';
      });
    }

    document.getElementById('btn-submit-post').addEventListener('click', async () => {
      const img = document.getElementById('post-image-url').value.trim();
      const cap = document.getElementById('post-caption').value.trim();
      if (!img) return alert("Cần link ảnh");
      const userData = (await getDoc(doc(db, "users", currentUser.uid))).data();
      await addDoc(collection(db, "posts"), {
        uid: currentUser.uid,
        username: userData.displayName,
        userAvatar: userData.photoURL || currentUser.photoURL,
        imageUrl: img,
        caption: cap,
        likes: [],
        comments: [],
        createdAt: serverTimestamp()
      });
      document.getElementById('post-image-url').value = '';
      document.getElementById('post-caption').value = '';
      alert("Đã đăng bài!");
      switchTab('home');
    });

    // ================= PROFILE =================
    async function loadProfile(uid) {
      const container = document.getElementById('profile-content');
      container.innerHTML = 'Đang tải...';
      const userRef = doc(db, "users", uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) { container.innerHTML = 'Không tồn tại'; return; }
      const data = snap.data();
      const isMe = uid === currentUser.uid;
      const isFollowing = data.followers?.[currentUser.uid];

      container.innerHTML = `
        <div class="profile-header">
          <img class="profile-avatar" src="${data.photoURL}">
          <div class="profile-info">
            <h2>${data.displayName}</h2>
            <p>${data.bio || ''}</p>
            <div class="profile-stats">
              <div><span>${Object.keys(data.followers||{}).length}</span> followers</div>
              <div><span>${Object.keys(data.following||{}).length}</span> following</div>
            </div>
            ${isMe ? '<button class="edit-profile" id="btn-edit">Sửa</button>' : `<button class="follow-btn ${isFollowing?'following':''}" id="follow-btn">${isFollowing?'Bỏ theo dõi':'Theo dõi'}</button>`}
          </div>
        </div>
        <h3>Bài viết</h3>
        <div class="profile-posts" id="profile-posts"></div>
      `;

      const postsQuery = query(collection(db, "posts"), where("uid", "==", uid), orderBy("createdAt", "desc"));
      const postsSnap = await getDocs(postsQuery);
      const postsDiv = document.getElementById('profile-posts');
      postsSnap.forEach(doc => {
        const img = document.createElement('img');
        img.src = doc.data().imageUrl;
        img.className = 'profile-post-img';
        img.onclick = () => alert(doc.data().caption);
        postsDiv.appendChild(img);
      });

      if (isMe) {
        document.getElementById('btn-edit').onclick = openEditProfile;
      } else {
        document.getElementById('follow-btn').onclick = () => toggleFollow(uid);
      }
    }

    async function openEditProfile() {
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      const data = snap.data();
      document.getElementById('edit-name').value = data.displayName;
      document.getElementById('edit-bio').value = data.bio || '';
      document.getElementById('edit-avatar').value = data.photoURL || '';
      document.getElementById('edit-profile-modal').style.display = 'flex';
    }

    document.getElementById('btn-save-profile').addEventListener('click', async () => {
      const name = document.getElementById('edit-name').value.trim();
      const bio = document.getElementById('edit-bio').value.trim();
      const avatar = document.getElementById('edit-avatar').value.trim();
      if (!name) return alert("Tên trống");
      await updateDoc(doc(db, "users", currentUser.uid), { displayName: name, bio, photoURL: avatar || currentUser.photoURL });
      document.getElementById('edit-profile-modal').style.display = 'none';
      loadProfile(currentUser.uid);
    });
    document.getElementById('btn-close-edit-modal').addEventListener('click', () => document.getElementById('edit-profile-modal').style.display = 'none');

    async function toggleFollow(uid) {
      const myRef = doc(db, "users", currentUser.uid);
      const targetRef = doc(db, "users", uid);
      const targetSnap = await getDoc(targetRef);
      const isFollow = targetSnap.data().followers?.[currentUser.uid];
      if (isFollow) {
        await updateDoc(targetRef, { [`followers.${currentUser.uid}`]: false });
        await updateDoc(myRef, { [`following.${uid}`]: false });
      } else {
        await updateDoc(targetRef, { [`followers.${currentUser.uid}`]: true });
        await updateDoc(myRef, { [`following.${uid}`]: true });
        addNotification(uid, 'follow', `${currentUser.displayName} đã theo dõi bạn`);
      }
      loadProfile(uid);
    }

    // ================= SEARCH =================
    document.getElementById('search-input').addEventListener('input', async (e) => {
      const kw = e.target.value.trim();
      const list = document.getElementById('user-list');
      if (!kw) { list.innerHTML = ''; return; }
      list.innerHTML = 'Đang tìm...';
      const q = query(collection(db, "users"), orderBy("displayName"), startAt(kw), endAt(kw+'\uf8ff'));
      const snap = await getDocs(q);
      list.innerHTML = '';
      snap.forEach(doc => {
        if (doc.id === currentUser.uid) return;
        const d = doc.data();
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `<img src="${d.photoURL}"><div class="name">${d.displayName}</div><button class="follow-btn">Xem</button>`;
        div.querySelector('.follow-btn').addEventListener('click', () => loadProfile(doc.id));
        list.appendChild(div);
      });
    });

    // ================= NOTIFICATIONS =================
    function listenNotifications() {
      const q = query(collection(db, "notifications"), where("to", "==", currentUser.uid), orderBy("createdAt", "desc"), limit(20));
      onSnapshot(q, snap => {
        let count = 0;
        notifList.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          if (!d.read) count++;
          const p = document.createElement('p');
          p.textContent = d.message + ' (' + new Date(d.createdAt?.toDate()).toLocaleTimeString() + ')';
          notifList.appendChild(p);
        });
        notifBadge.textContent = count;
        notifBadge.style.display = count > 0 ? 'inline' : 'none';
      });
    }

    async function addNotification(to, type, message) {
      await addDoc(collection(db, "notifications"), {
        to, from: currentUser.uid, type, message, read: false, createdAt: serverTimestamp()
      });
    }

    document.getElementById('btn-notifications').addEventListener('click', () => notifModal.style.display = 'flex');
    document.getElementById('btn-close-notif').addEventListener('click', () => notifModal.style.display = 'none');

    // ================= CHAT =================
    document.getElementById('btn-chat').addEventListener('click', () => {
      chatModal.style.display = 'flex';
      loadChatList();
    });

    async function loadChatList() {
      chatListDiv.style.display = 'block';
      chatWindow.style.display = 'none';
      const myRef = doc(db, "users", currentUser.uid);
      const snap = await getDoc(myRef);
      const following = snap.data()?.following || {};
      chatListDiv.innerHTML = '';
      for (const uid in following) {
        if (!following[uid]) continue;
        const u = await getDoc(doc(db, "users", uid));
        if (!u.exists()) continue;
        const data = u.data();
        const div = document.createElement('div');
        div.className = 'chat-item';
        div.innerHTML = `<img src="${data.photoURL}"><span>${data.displayName}</span>`;
        div.addEventListener('click', () => openChat(uid, data.displayName));
        chatListDiv.appendChild(div);
      }
    }

    function openChat(uid, name) {
      currentChatUser = uid;
      chatListDiv.style.display = 'none';
      chatWindow.style.display = 'flex';
      chatUsername.textContent = name;
      loadMessages();
    }

    function loadMessages() {
      const chatId = [currentUser.uid, currentChatUser].sort().join('_');
      const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("createdAt"));
      if (unsubscribes[chatId]) unsubscribes[chatId]();
      unsubscribes[chatId] = onSnapshot(q, snap => {
        chatMessages.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          const div = document.createElement('div');
          div.className = `message ${d.from === currentUser.uid ? 'sent' : 'received'}`;
          div.innerHTML = `<div class="message-bubble">${d.text}</div>`;
          chatMessages.appendChild(div);
        });
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });
    }

    document.getElementById('btn-send-message').addEventListener('click', async () => {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !currentChatUser) return;
      const chatId = [currentUser.uid, currentChatUser].sort().join('_');
      await addDoc(collection(db, "messages"), {
        chatId,
        from: currentUser.uid,
        to: currentChatUser,
        text,
        createdAt: serverTimestamp()
      });
      input.value = '';
    });

    document.getElementById('btn-back-chat-list').addEventListener('click', loadChatList);

    // Đóng modal chat
    document.getElementById('chat-modal').addEventListener('click', (e) => {
      if (e.target === chatModal) chatModal.style.display = 'none';
    });

    // Đăng xuất
    window.addEventListener('popstate', () => { if (auth.currentUser) signOut(auth); });
  </script>
</body>
</html>
