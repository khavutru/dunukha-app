<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunukha Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #fafafa; display: flex; justify-content: center; }
        #app { max-width: 480px; width: 100%; background: #fff; min-height: 100vh; display: none; flex-direction: column; position: relative; }
        
        /* LOGIN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #f09433, #bc1888); padding: 20px; color: white; }
        .login-box { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; }
        .login-logo { font-size: 50px; font-weight: 900; background: linear-gradient(45deg, #fff, #ffdd00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; color: white; }
        .login-btn.google { background: #db4437; color: white; }
        .login-btn.facebook { background: #1877f2; }
        .login-btn.email { background: #333; }
        .login-btn.phone { background: #0f9d58; }
        .login-input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; }
        
        /* HEADER & NAV */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #dbdbdb; background: #fff; position: sticky; top: 0; z-index: 20; }
        .logo { font-size: 22px; font-weight: 700; background: linear-gradient(45deg, #f09433, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bottom-nav { display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #dbdbdb; background: #fff; position: fixed; bottom: 0; width: 100%; max-width: 480px; z-index: 10; }
        .bottom-nav i { font-size: 24px; color: #262626; cursor: pointer; }
        .bottom-nav i.active { color: #0095f6; }
        
        .page { display: none; flex: 1; overflow-y: auto; padding-bottom: 60px; }
        .page.active { display: block; }
        .post { background: #fff; border: 1px solid #dbdbdb; border-radius: 12px; margin-bottom: 15px; padding: 10px; }
        .post-header { display: flex; align-items: center; gap: 10px; cursor: pointer; padding-bottom: 5px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .post-username { font-weight: 600; }
        .post-time { font-size: 12px; color: #888; margin-left: auto; margin-right: 10px; }
        .post-media { width: 100%; max-height: 500px; object-fit: contain; border-radius: 10px; margin-top: 5px; }
        .post-actions { display: flex; gap: 20px; margin-top: 10px; font-size: 24px; }
        .post-actions i { cursor: pointer; transition: 0.2s; }
        .post-actions i.liked { color: #ed4956; }
        .comment-input { display: flex; margin-top: 10px; border-top: 1px solid #efefef; padding-top: 10px; }
        .comment-input input { flex: 1; border: none; outline: none; padding: 5px; }
        .comment-input button { background: none; border: none; color: #0095f6; font-weight: 600; cursor: pointer; }
        
        /* PROFILE */
        .profile-header { padding: 20px; display: flex; gap: 20px; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .profile-stats { display: flex; gap: 15px; margin: 10px 0; font-size: 14px; }
        .profile-stats span { font-weight: 600; }
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
        .profile-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 30; }
        .modal-content { background: #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; max-height: 80%; overflow-y: auto; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 8px; }
        .modal-content button { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; border-radius: 8px; font-weight: 600; margin-top: 10px; cursor: pointer; }
        
        .side-menu { position: fixed; top: 0; left: 0; width: 75%; max-width: 300px; height: 100%; background: #fff; z-index: 40; transform: translateX(-100%); transition: 0.3s; padding: 20px; }
        .side-menu.open { transform: translateX(0); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 35; }
        .overlay.show { display: block; }
        
        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 999; }
        .toast.show { opacity: 1; }
        .search-result { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #efefef; cursor: pointer; }
        .search-result:hover { background: #f5f5f5; }
        .call-btn { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .video-call-btn { background: #2196F3; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    <div id="login-screen">
        <div class="login-box">
            <div class="login-logo">D</div>
            <h2>Dunukha</h2>
            <p style="margin-bottom: 20px; opacity: 0.8;">Kết nối bạn bè, chia sẻ cuộc sống</p>
            <div id="email-form">
                <input class="login-input" id="login-email" placeholder="Email">
                <input class="login-input" id="login-password" type="password" placeholder="Mật khẩu">
                <button class="login-btn email" id="email-login-btn">Đăng nhập</button>
                <button class="login-btn email" id="email-register-btn" style="background:#ff9f00;">Đăng ký</button>
            </div>
            <div id="phone-form" style="display:none;">
                <input class="login-input" id="login-phone" placeholder="Số điện thoại">
                <input class="login-input" id="login-otp" placeholder="Mã OTP">
                <button class="login-btn phone" id="phone-send-otp">Gửi OTP</button>
                <button class="login-btn phone" id="phone-verify">Xác thực</button>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px; justify-content: center;">
                <span style="cursor:pointer; color:#ffdd00; font-size:14px;" id="toggle-phone">Dùng SĐT</span>
                <span style="cursor:pointer; color:#ffdd00; font-size:14px; display:none;" id="toggle-email">Dùng Email</span>
            </div>
            <button class="login-btn google" id="google-login"><i class="fab fa-google"></i> Google</button>
            <button class="login-btn facebook" id="facebook-login"><i class="fab fa-facebook"></i> Facebook</button>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <i class="fas fa-bars" id="menu-btn"></i>
            <div class="logo">Dunukha</div>
            <div class="header-icons">
                <i class="far fa-heart badge" id="notif-btn" data-count="0"></i>
                <i class="far fa-paper-plane" id="chat-btn"></i>
            </div>
        </div>

        <div class="page active" id="page-home">
            <div id="stories"></div>
            <div id="feed"></div>
            <div id="feed-loader" style="text-align:center; padding:10px; color:#888; display:none;">Đang tải...</div>
        </div>

        <div class="page" id="page-explore">
            <div style="padding:15px;">
                <input type="text" id="search-input" placeholder="Tìm người dùng..." style="width:100%; padding:10px; border-radius:10px; border:1px solid #dbdbdb;">
            </div>
            <div id="search-results"></div>
        </div>

        <div class="page" id="page-reels">
            <div id="reels-container" style="height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory;"></div>
        </div>

        <div class="page" id="page-post">
            <div style="padding:20px;">
                <input type="file" id="post-files" accept="image/*,video/*" multiple>
                <div id="preview-container" style="display:flex; gap:5px; margin:10px 0;"></div>
                <textarea id="post-caption" placeholder="Viết gì đó..." style="width:100%; padding:10px; border:1px solid #dbdbdb; border-radius:8px;"></textarea>
                <button id="submit-post" style="width:100%; padding:12px; background:#0095f6; color:white; border:none; border-radius:8px; font-weight:600;">Đăng</button>
            </div>
        </div>

        <div class="page" id="page-profile">
            <div id="profile-content"></div>
        </div>

        <div class="bottom-nav">
            <i class="fas fa-home active" data-page="home"></i>
            <i class="fas fa-search" data-page="explore"></i>
            <i class="fas fa-video" data-page="reels"></i>
            <i class="far fa-plus-square" data-page="post"></i>
            <i class="far fa-user-circle" data-page="profile"></i>
        </div>
    </div>

    <div class="overlay" id="menu-overlay"></div>
    <div class="side-menu" id="side-menu">
        <i class="fas fa-times" id="close-menu" style="align-self:flex-end; font-size:24px; cursor:pointer;"></i>
        <div class="menu-item" data-action="profile" style="padding:12px 0; cursor:pointer;">Trang cá nhân</div>
        <div class="menu-item" data-action="edit-profile" style="padding:12px 0; cursor:pointer;">Chỉnh sửa hồ sơ</div>
        <div class="menu-item" data-action="saved" style="padding:12px 0; cursor:pointer;">Đã lưu</div>
        <div class="menu-item" data-action="logout" style="padding:12px 0; cursor:pointer;">Đăng xuất</div>
    </div>

    <div class="modal" id="chat-modal">
        <div class="modal-content" style="height:90%; display:flex; flex-direction:column; padding:0;">
            <div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #dbdbdb;">
                <h3 id="chat-username">Chat</h3>
                <div>
                    <button id="chat-call-btn" style="background:none; border:none; font-size:20px; color:#4CAF50; cursor:pointer; margin-right:10px;"><i class="fas fa-phone"></i></button>
                    <button id="chat-video-btn" style="background:none; border:none; font-size:20px; color:#2196F3; cursor:pointer;"><i class="fas fa-video"></i></button>
                    <button id="chat-close-btn" style="background:none; border:none; font-size:16px; color:#0095f6; cursor:pointer;">Đóng</button>
                </div>
            </div>
            <div id="chat-list" style="flex:1; overflow-y:auto; padding:10px;"></div>
            <div id="chat-window" style="display:none; flex:1; flex-direction:column;">
                <div id="chat-messages" style="flex:1; overflow-y:auto; padding:10px;"></div>
                <div style="display:flex; padding:10px; border-top:1px solid #dbdbdb;">
                    <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." style="flex:1; border:1px solid #dbdbdb; border-radius:20px; padding:8px 15px;">
                    <button id="chat-send-btn" style="background:#0095f6; color:white; border:none; border-radius:50%; width:36px; height:36px; margin-left:10px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h3>Chỉnh sửa hồ sơ</h3>
            <input type="text" id="edit-displayname" placeholder="Tên hiển thị">
            <input type="text" id="edit-username" placeholder="Username">
            <textarea id="edit-bio" placeholder="Giới thiệu bản thân"></textarea>
            <input type="text" id="edit-location" placeholder="Địa điểm">
            <label>Avatar</label>
            <input type="file" id="edit-avatar">
            <button id="save-edit">Lưu</button>
        </div>
    </div>

    <div class="modal" id="call-modal">
        <div class="modal-content" style="background:black; height:80%; width:90%; max-width:500px; padding:0; border-radius:12px; overflow:hidden;">
            <button id="close-call" style="position:absolute; top:10px; right:10px; background:white; border:none; border-radius:50%; width:30px; height:30px; font-weight:bold; z-index:10;">X</button>
            <div id="jitsi-container" style="width:100%; height:100%;"></div>
        </div>
    </div>

    <script type="module">
        // 🔴 QUAN TRỌNG: ĐÂY LÀ CẤU HÌNH FIREBASE CỦA BẠN 🔴
        const firebaseConfig = {
            apiKey: "AIzaSyDURjXMqgt_pVaCcpNUSoCM9KPIR7OmW10",
            authDomain: "dunukhacall.firebaseapp.com",
            databaseURL: "https://dunukhacall-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dunukhacall",
            storageBucket: "dunukhacall.firebasestorage.app",
            messagingSenderId: "907574693616",
            appId: "1:907574693616:web:632e8ebc4937842765bc35"
        };
        // ----------------------------------------------------------------

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where, getDocs, setDoc, getDoc, limit, startAfter, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const IMGBB_API_KEY = "d4802501f212046a8d74561bbdaf6dd3";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        const facebookProvider = new FacebookAuthProvider();

        let currentUser = null;
        let currentChatUser = null;
        let unsubscribes = {};
        let allUsersCache = null;
        let lastPostDoc = null;
        let isLoadingPosts = false;
        let confirmationResult = null;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2000);
        }

        // --- AUTH ---
        document.getElementById('google-login').onclick = () => signInWithPopup(auth, googleProvider).catch(e => showToast('Lỗi: '+e.message));
        document.getElementById('facebook-login').onclick = () => signInWithPopup(auth, facebookProvider).catch(e => showToast('Lỗi: '+e.message));
        document.getElementById('email-login-btn').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { showToast('Lỗi: '+e.message); }
        };
        document.getElementById('email-register-btn').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try { await createUserWithEmailAndPassword(auth, email, pass); } catch(e) { showToast('Lỗi: '+e.message); }
        };
        document.getElementById('phone-send-otp').onclick = async () => {
            const phone = document.getElementById('login-phone').value;
            try {
                const recaptcha = new RecaptchaVerifier(auth, 'phone-send-otp', {size:'invisible'});
                confirmationResult = await signInWithPhoneNumber(auth, phone, recaptcha);
                showToast('Đã gửi OTP');
            } catch(e) { showToast('Lỗi: '+e.message); }
        };
        document.getElementById('phone-verify').onclick = async () => {
            const otp = document.getElementById('login-otp').value;
            try { await confirmationResult.confirm(otp); } catch(e) { showToast('Lỗi: '+e.message); }
        };
        document.getElementById('toggle-phone').onclick = () => {
            document.getElementById('email-form').style.display = 'none';
            document.getElementById('phone-form').style.display = 'block';
            document.getElementById('toggle-phone').style.display = 'none';
            document.getElementById('toggle-email').style.display = 'block';
        };
        document.getElementById('toggle-email').onclick = () => {
            document.getElementById('email-form').style.display = 'block';
            document.getElementById('phone-form').style.display = 'none';
            document.getElementById('toggle-phone').style.display = 'block';
            document.getElementById('toggle-email').style.display = 'none';
        };

        onAuthStateChanged(auth, async user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                await ensureUserDoc(user);
                navigateTo('home');
                listenNotifications();
                showToast('Đăng nhập thành công!');
            } else {
                currentUser = null;
                document.getElementById('app').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                Object.values(unsubscribes).forEach(u => u());
                unsubscribes = {};
            }
        });

        async function ensureUserDoc(user) {
            const ref = doc(db, "users", user.uid);
            if (!(await getDoc(ref)).exists()) {
                await setDoc(ref, {
                    displayName: user.displayName || user.email?.split('@')[0] || "Người dùng",
                    email: user.email || "",
                    photoURL: user.photoURL || "https://via.placeholder.com/150",
                    username: user.email?.split('@')[0] || "user"+user.uid.slice(0,5),
                    bio: "",
                    location: "",
                    followers: {},
                    following: {},
                    saved: [],
                    blocked: {},
                    isPrivate: false,
                    lastActive: serverTimestamp(),
                    createdAt: serverTimestamp()
                });
            } else {
                await updateDoc(ref, { lastActive: serverTimestamp() });
            }
        }

        async function uploadImgBB(file) {
            const fd = new FormData(); fd.append('image', file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:'POST', body:fd});
            const data = await res.json();
            if (!data.success) throw new Error('Upload lỗi');
            return data.data.url;
        }

        // --- NAVIGATION ---
        const pages = { home: document.getElementById('page-home'), explore: document.getElementById('page-explore'), reels: document.getElementById('page-reels'), post: document.getElementById('page-post'), profile: document.getElementById('page-profile') };
        document.querySelectorAll('.bottom-nav i').forEach(icon => {
            icon.addEventListener('click', () => navigateTo(icon.dataset.page));
        });
        function navigateTo(page) {
            document.querySelectorAll('.bottom-nav i').forEach(i => i.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages[page].classList.add('active');
            if (page === 'home') { loadStories(); loadFeed(); }
            else if (page === 'explore') loadExplore();
            else if (page === 'reels') loadReels();
            else if (page === 'profile') loadProfile(currentUser.uid);
        }

        // --- STORIES ---
        async function loadStories() {
            const container = document.getElementById('stories');
            container.innerHTML = '';
            try {
                const snap = await getDocs(query(collection(db, "stories"), orderBy("expiresAt", "desc")));
                const now = new Date();
                const users = {};
                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.expiresAt.toDate() > now) {
                        if (!users[d.uid]) users[d.uid] = { ...d, stories: [] };
                        users[d.uid].stories.push(d);
                    }
                });
                for (const uid in users) {
                    const u = users[uid];
                    const uDoc = await getDoc(doc(db, "users", uid));
                    if (!uDoc.exists()) continue;
                    const data = uDoc.data();
                    const div = document.createElement('div');
                    div.className = 'story-item';
                    div.innerHTML = `<div class="story-ring"><img src="${data.photoURL}"></div><span>${data.displayName}</span>`;
                    div.onclick = () => viewStory(u.stories);
                    container.appendChild(div);
                }
            } catch (e) { console.error('Lỗi stories:', e); }
            const myDiv = document.createElement('div');
            myDiv.className = 'story-item';
            myDiv.innerHTML = `<div class="story-ring" style="background:#ddd; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus"></i></div><span>Bạn</span>`;
            myDiv.onclick = () => navigateTo('post');
            container.appendChild(myDiv);
        }

        function viewStory(stories) {
            let i = 0;
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:50;';
            const img = document.createElement('img'); img.style.cssText = 'width:100%; height:100%; object-fit:contain;';
            const video = document.createElement('video'); video.style.cssText = 'width:100%; height:100%; object-fit:contain;'; video.controls = true; video.autoplay = true;
            const closeBtn = document.createElement('button');
            closeBtn.textContent = 'X'; closeBtn.style.cssText = 'position:absolute; top:10px; right:10px; background:white; border:none; border-radius:50%; width:30px; height:30px;';
            closeBtn.onclick = () => { clearInterval(timer); modal.remove(); };
            modal.appendChild(closeBtn);
            const show = () => {
                const s = stories[i];
                if (s.mediaType === 'video') {
                    video.src = s.mediaUrl; modal.appendChild(video); img.remove();
                } else {
                    img.src = s.mediaUrl; modal.appendChild(img); video.remove();
                }
            };
            show();
            document.body.appendChild(modal);
            const timer = setInterval(() => {
                i++;
                if (i >= stories.length) { clearInterval(timer); modal.remove(); }
                else show();
            }, 5000);
        }

        // --- FEED ---
        function loadFeed() {
            document.getElementById('feed').innerHTML = '';
            lastPostDoc = null;
            fetchPosts();
        }

        async function fetchPosts() {
            if (isLoadingPosts) return;
            isLoadingPosts = true;
            document.getElementById('feed-loader').style.display = 'block';
            try {
                const q = lastPostDoc ? query(collection(db, "posts"), orderBy("createdAt", "desc"), startAfter(lastPostDoc), limit(5)) : query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(5));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    snap.forEach(doc => { renderPost(doc.data(), doc.id); lastPostDoc = doc; });
                } else {
                    if (!lastPostDoc) document.getElementById('feed').innerHTML = '<div style="text-align:center;padding:20px;color:#888;">Chưa có bài viết nào.</div>';
                }
            } catch (e) { console.error('Lỗi feed:', e); showToast('Lỗi tải feed'); }
            isLoadingPosts = false;
            document.getElementById('feed-loader').style.display = 'none';
        }

        document.getElementById('page-home').addEventListener('scroll', function() {
            if (this.scrollHeight - this.scrollTop - this.clientHeight < 100 && !isLoadingPosts) fetchPosts();
        });

        function renderPost(post, id) {
            const isOwner = post.uid === currentUser.uid;
            const liked = post.likes?.includes(currentUser.uid);
            const div = document.createElement('div');
            div.className = 'post';
            div.dataset.id = id;
            const media = post.mediaUrls?.map(url =>

                            ${isOwner ? '<div class="menu-opt" data-action="delete" data-id="'+id+'">Xóa</div>' : ''}
                            <div class="menu-opt" data-action="save" data-id="${id}">Lưu</div>
                            <div class="menu-opt" data-action="report" data-id="${id}">Báo cáo</div>

                    <i class="far fa-paper-plane share-btn" data-id="${id}"></i>
                    <i class="far fa-bookmark save-btn" data-id="${id}"></i>
                </div>
                <div class="post-likes">${post.likes?.length || 0} thích</div>
                <div class="post-caption"><strong>${post.username}</strong> ${post.caption || ''}</div>
                <div class="comment-input">
                    <input placeholder="Viết bình luận..." id="comment-${id}">
                    <button class="send-comment" data-id="${id}">Đăng</button>
                </div>
                <div id="comments-${id}" style="margin-top:5px;"></div>
            `;
            document.getElementById('feed').appendChild(div);

            // Click vào header -> mở profile
            div.querySelector('.post-header').addEventListener('click', (e) => {
                if (e.target.closest('.fa-ellipsis-v')) return;
                const uid = div.querySelector('.post-header').dataset.uid;
                if (uid) loadProfile(uid);
            });

            // 3 chấm menu
            div.querySelector('.fa-ellipsis-v').onclick = (e) => {
                e.stopPropagation();
                document.querySelectorAll('.post-menu').forEach(m => m.style.display = 'none');
                const menu = div.querySelector('.post-menu');
                menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
            };
            div.querySelectorAll('.menu-opt').forEach(opt => {
                opt.onclick = async (e) => {
                    e.stopPropagation();
                    const action = opt.dataset.action;
                    const pid = opt.dataset.id;
                    if (action === 'delete') {
                        if (confirm('Xóa bài viết này?')) {
                            await deleteDoc(doc(db, "posts", pid));
                            div.remove();
                            showToast('Đã xóa');
                        }
                    } else if (action === 'save') {
                        const userRef = doc(db, "users", currentUser.uid);
                        const snap = await getDoc(userRef);
                        const saved = snap.data().saved || [];
                        if (saved.includes(pid)) {
                            await updateDoc(userRef, { saved: arrayRemove(pid) });
                            showToast('Đã bỏ lưu');
                        } else {
                            await updateDoc(userRef, { saved: arrayUnion(pid) });
                            showToast('Đã lưu');
                        }
                    } else if (action === 'report') {
                        const reason = prompt('Lý do báo cáo:');
                        if (reason) {
                            await addDoc(collection(db, "reports"), { reporter: currentUser.uid, postId: pid, reason, createdAt: serverTimestamp() });
                            showToast('Đã báo cáo');
                        }
                    }
                    document.querySelectorAll('.post-menu').forEach(m => m.style.display = 'none');
                };
            });
            document.addEventListener('click', () => document.querySelectorAll('.post-menu').forEach(m => m.style.display = 'none'));

            // Like
            div.querySelector('[data-id]').onclick = async (e) => {
                if (e.target.classList.contains('fa-heart')) {
                    const ref = doc(db, "posts", id);
                    if (liked) {
                        await updateDoc(ref, { likes: arrayRemove(currentUser.uid) });
                        e.target.classList.remove('liked', 'fas');
                        e.target.classList.add('far');
                    } else {
                        await updateDoc(ref, { likes: arrayUnion(currentUser.uid) });
                        e.target.classList.add('liked', 'fas');
                        e.target.classList.remove('far');
                        if (post.uid !== currentUser.uid) addNotification(post.uid, 'like', `${currentUser.displayName} đã thích bài của bạn`);
                    }
                    const likesSpan = div.querySelector('.post-likes');
                    const newData = await getDoc(doc(db, "posts", id));
                    likesSpan.textContent = (newData.data().likes?.length || 0) + ' thích';
                }
            };

            // Comment
            div.querySelector('.send-comment').onclick = async () => {
                const input = document.getElementById(`comment-${id}`);
                const text = input.value.trim();
                if (!text) return;
                await updateDoc(doc(db, "posts", id), { comments: arrayUnion({ uid: currentUser.uid, username: currentUser.displayName, avatar: currentUser.photoURL, text, createdAt: serverTimestamp() }) });
                if (post.uid !== currentUser.uid) addNotification(post.uid, 'comment', `${currentUser.displayName}: ${text}`);
                input.value = '';
                loadComments(id);
                showToast('Đã bình luận');
            };

            // Save button
            div.querySelector('.save-btn').onclick = async () => {
                const userRef = doc(db, "users", currentUser.uid);

                if (saved.includes(id)) {
                    await updateDoc(userRef, { saved: arrayRemove(id) });
                    showToast('Đã bỏ lưu');

                    showToast('Đã lưu');

            div.querySelector('.share-btn').onclick = () => {

        async function loadComments(postId) {
            const container = document.getElementById(`comments-${postId}`);
            if (!container) return;
            const snap = await getDoc(doc(db, "posts", postId));
            const comments = snap.data()?.comments || [];
            container.innerHTML = '';
            comments.forEach((c, idx) => {
                const div = document.createElement('div');
                div.style.cssText = 'padding:5px 0; border-bottom:1px solid #efefef; display:flex; gap:8px;';
                div.innerHTML = `
                    <img src="${c.avatar || 'https://via.placeholder.com/24'}" style="width:24px;height:24px;border-radius:50%;">
                    <div><strong>${c.username}</strong> ${c.text}</div>
                `;
                container.appendChild(div);
            });
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'Vừa xong';
            if (diff < 3600000) return Math.floor(diff/60000) + ' phút trước';
            if (diff < 86400000) return Math.floor(diff/3600000) + ' giờ trước';
            if (diff < 172800000) return 'Hôm qua';
            return Math.floor(diff/86400000) + ' ngày trước';
        }

        // --- POST UPLOAD ---
        document.getElementById('post-files').onchange = function() {
            const preview = document.getElementById('preview-container');
            preview.innerHTML = '';
            for (const f of this.files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const el = f.type.startsWith('video') ? document.createElement('video') : document.createElement('img');
                    el.src = e.target.result;
                    el.style.width = '80px'; el.style.height = '80px'; el.style.objectFit = 'cover';
                    preview.appendChild(el);
                };
                reader.readAsDataURL(f);
            }
        };
        document.getElementById('submit-post').onclick = async () => {
            const files = document.getElementById('post-files').files;
            const caption = document.getElementById('post-caption').value.trim();
            if (!files.length) return showToast('Chọn ảnh/video');
            document.getElementById('submit-post').disabled = true;
            document.getElementById('submit-post').textContent = 'Đang đăng...';
            try {
                const urls = [];
                for (const f of files) urls.push(await uploadImgBB(f));
                const uData = (await getDoc(doc(db, "users", currentUser.uid))).data();
                await addDoc(collection(db, "posts"), {
                    uid: currentUser.uid,
                    username: uData.displayName,
                    userAvatar: uData.photoURL,
                    mediaUrls: urls,
                    mediaType: files[0].type.startsWith('video') ? 'video' : 'image',
                    caption,
                    likes: [],
                    comments: [],
                    createdAt: serverTimestamp()
                });
                showToast('Đã đăng!');
                navigateTo('home');
                document.getElementById('post-files').value = '';
                document.getElementById('preview-container').innerHTML = '';
                document.getElementById('post-caption').value = '';
            } catch (e) { showToast('Lỗi: '+e.message); }
            document.getElementById('submit-post').disabled = false;
            document.getElementById('submit-post').textContent = 'Đăng';
        };

        // --- REELS ---
        async function loadReels() {
            const container = document.getElementById('reels-container');
            container.innerHTML = '';
            try {
                const snap = await getDocs(query(collection(db, "posts"), where("mediaType", "==", "video"), orderBy("createdAt", "desc"), limit(10)));
                snap.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = 'reel-item';
                    div.innerHTML = `<video src="${d.mediaUrls[0]}" controls style="width:100%; height:100%; object-fit:contain;"></video>`;
                    container.appendChild(div);
                });
            } catch (e) { console.error('Lỗi reels:', e); }
        }

        // --- EXPLORE & SEARCH ---
        async function loadExplore() {
            const grid = document.getElementById('search-results');
            grid.innerHTML = '';
            try {
                const snap = await getDocs(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(12)));
                snap.forEach(doc => {
                    const p = doc.data();
                    const el = document.createElement('img');
                    el.src = p.mediaUrls?.[0] || p.mediaUrl;
                    el.style.width = '100%'; el.style.aspectRatio = '1/1'; el.style.objectFit = 'cover';

                });

        document.getElementById('search-input').addEventListener('input', async (e) => {
            const kw = e.target.value.trim().toLowerCase();
            const grid = document.getElementById('search-results');
            if (kw) {
                if (!allUsersCache) {
                    const snap = await getDocs(collection(db, "users"));
                    allUsersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                }
                const filtered = allUsersCache.filter(u =>
                    u.displayName?.toLowerCase().includes(kw) || u.username?.toLowerCase().includes(kw)
                );
                grid.innerHTML = '';
                filtered.forEach(u => {
                    const div = document.createElement('div');
                    div.className = 'search-result';
                    div.dataset.uid = u.id;  // Lưu ID người dùng vào data attribute
                    div.innerHTML = `
                        <img src="${u.photoURL || 'https://via.placeholder.com/44'}" style="width:44px;height:44px;border-radius:50%;">
                        <div>
                            <div style="font-weight:600;">${u.displayName}</div>

                        </div>

        // --- PROFILE ---
        async function loadProfile(uid) {
            const container = document.getElementById('profile-content');
            container.innerHTML = 'Đang tải...';
            const ref = doc(db, "users", uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) { container.innerHTML = 'Người dùng không tồn tại'; return; }
            const data = snap.data();
            const isMe = uid === currentUser.uid;
            const isFollowing = data.followers?.[currentUser.uid];
            const isPrivate = data.isPrivate === true;
            if (data.blocked?.[currentUser.uid]) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">Bạn đã bị chặn</div>';
                return;
            }
            const canViewPosts = isMe || !isPrivate || isFollowing;

            let lastActiveStr = 'Không hoạt động';
            if (data.lastActive) {
                const d = data.lastActive.toDate ? data.lastActive.toDate() : new Date(data.lastActive);
                lastActiveStr = formatTime(d) + ' trước';
            }

            container.innerHTML = `
                <div class="profile-header">
                    <img class="profile-avatar" src="${data.photoURL || 'https://via.placeholder.com/150'}">
                    <div class="profile-info">
                        <h2>${data.displayName}</h2>
                        <p>@${data.username}</p>
                        <div class="profile-stats">
                            <div><span>${Object.keys(data.followers||{}).length}</span> followers</div>
                            <div><span>${Object.keys(data.following||{}).length}</span> following</div>
                        </div>
                        <p>${data.bio || ''}</p>
                        <p style="font-size:12px; color:#888;">📍 ${data.location || 'Chưa có địa điểm'}</p>
                        <p style="font-size:12px; color:#888;">🟢 Hoạt động ${lastActiveStr}</p>
                        <div style="margin-top:10px; display:flex; flex-wrap:wrap; gap:6px;">
                            ${isMe ? `
                                <button class="btn" id="edit-profile-btn" style="padding:6px 16px; border:1px solid #dbdbdb; border-radius:8px; background:#fafafa;">Chỉnh sửa</button>
                            ` : `
                                <button class="btn" id="follow-btn" style="padding:6px 16px; border:1px solid #dbdbdb; border-radius:8px; background:${isFollowing ? '#fafafa' : '#0095f6'}; color:${isFollowing ? '#262626' : 'white'}; font-weight:600;">${isFollowing ? 'Bỏ theo dõi' : 'Theo dõi'}</button>
                                <button class="btn" id="msg-btn" style="padding:6px 16px; border:1px solid #dbdbdb; border-radius:8px; background:#0095f6; color:white; font-weight:600;">Nhắn tin</button>
                                <button class="call-btn" id="call-btn">📞 Gọi</button>
                                <button class="video-call-btn" id="video-call-btn">📹 Video</button>
                            `}
                        </div>
                    </div>
                </div>
                <div class="profile-grid" id="profile-grid"></div>
            `;

            const grid = document.getElementById('profile-grid');
            if (canViewPosts) {
                try {
                    const postsQ = query(collection(db, "posts"), where("uid", "==", uid), orderBy("createdAt", "desc"), limit(12));
                    const postsSnap = await getDocs(postsQ);
                    grid.innerHTML = '';
                    postsSnap.forEach(doc => {
                        const d = doc.data();
                        const el = document.createElement('img');
                        el.src = d.mediaUrls?.[0] || d.mediaUrl;
                        el.style.width = '100%'; el.style.aspectRatio = '1/1'; el.style.objectFit = 'cover';
                        el.onclick = () => alert(`📷 ${d.caption || 'Không có caption'}`);
                        grid.appendChild(el);
                    });
                    if (grid.innerHTML === '') grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px; color:#888;">Chưa có bài viết</div>';
                } catch (e) { console.error('Lỗi profile grid:', e); }
            } else {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#888;">🔒 Tài khoản riêng tư</div>';
            }

            if (isMe) {
                document.getElementById('edit-profile-btn').onclick = () => {
                    document.getElementById('edit-modal').style.display = 'flex';
                    document.getElementById('edit-displayname').value = data.displayName || '';
                    document.getElementById('edit-username').value = data.username || '';
                    document.getElementById('edit-bio').value = data.bio || '';
                    document.getElementById('edit-location').value = data.location || '';
                };
            } else {
                document.getElementById('follow-btn').onclick = async () => {
                    if (isFollowing) {
                        await updateDoc(doc(db, "users", uid), { [`followers.${currentUser.uid}`]: false });
                        await updateDoc(doc(db, "users", currentUser.uid), { [`following.${uid}`]: false });
                        showToast('Đã bỏ theo dõi');
                    } else {
                        await updateDoc(doc(db, "users", uid), { [`followers.${currentUser.uid}`]: true });
                        await updateDoc(doc(db, "users", currentUser.uid), { [`following.${uid}`]: true });
                        addNotification(uid, 'follow', `${currentUser.displayName} theo dõi bạn`);
                        showToast('Đã theo dõi');
                    }
                    loadProfile(uid);
                };
                document.getElementById('msg-btn').onclick = () => {
                    document.getElementById('chat-btn').click();
                    setTimeout(() => openChat(uid, data.displayName), 500);
                };
                document.getElementById('call-btn').onclick = () => {
                    const roomId = [currentUser.uid, uid].sort().join('_');

                    const roomId = [currentUser.uid, uid].sort().join('_');
                    startCall(roomId, false);
                };

        document.getElementById('save-edit').onclick = async () => {
            const updates = {
                displayName: document.getElementById('edit-displayname').value.trim(),
                username: document.getElementById('edit-username').value.trim(),
                bio: document.getElementById('edit-bio').value.trim(),
                location: document.getElementById('edit-location').value.trim()
            };

            if (file) {
                try {
                    updates.photoURL = await uploadImgBB(file);

            await updateDoc(doc(db, "users", currentUser.uid), updates);

            showToast('Đã cập nhật hồ sơ');

        async function loadChatList() {
            document.getElementById('chat-list').style.display = 'block';
            document.getElementById('chat-window').style.display = 'none';
            const snap = await getDoc(doc(db, "users", currentUser.uid));
            const following = snap.data()?.following || {};
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            for (const uid in following) {
                if (!following[uid]) continue;
                const u = await getDoc(doc(db, "users", uid));
                if (!u.exists()) continue;
                const d = u.data();
                const div = document.createElement('div');
                div.style.cssText = 'display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid #efefef; cursor:pointer;';
                div.innerHTML = `
                    <img src="${d.photoURL}" style="width:44px;height:44px;border-radius:50%;">
                    <span>${d.displayName}</span>
                `;
                div.onclick = () => openChat(uid, d.displayName);
                list.appendChild(div);
            }

        function openChat(uid, name) {
            currentChatUser = uid;
            document.getElementById('chat-list').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-username').textContent = name;
            loadMessages();
        }

        function loadMessages() {
            const chatId = [currentUser.uid, currentChatUser].sort().join('_');
            if (unsubscribes[chatId]) unsubscribes[chatId]();
            const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("createdAt"));
            unsubscribes[chatId] = onSnapshot(q, snap => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const row = document.createElement('div');
                    row.className = `message-bubble ${d.from === currentUser.uid ? 'sent' : 'received'}`;
                    row.textContent = d.text;
                    container.appendChild(row);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById('chat-send-btn').onclick = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !currentChatUser) return;
            const chatId = [currentUser.uid, currentChatUser].sort().join('_');
            await addDoc(collection(db, "messages"), { chatId, from: currentUser.uid, to: currentChatUser, text, type: 'text', createdAt: serverTimestamp() });
            input.value = '';
        };

        // --- CALL (Jitsi) ---
        function startCall(roomName, audioOnly) {
            const modal = document.getElementById('call-modal');
            modal.style.display = 'flex';
            const container = document.getElementById('jitsi-container');
            container.innerHTML = '';
            const iframe = document.createElement('iframe');
            iframe.style.width = '100%'; iframe.style.height = '100%'; iframe.style.border = 'none';
            iframe.allow = 'microphone; camera; display-capture';
            const domain = 'meet.jit.si';
            const options = {
                roomName: roomName,
                parentNode: container,
                width: '100%', height: '100%',
                configOverwrite: {
                    startWithVideoMuted: audioOnly,
                    startWithAudioMuted: false,
                },
                interfaceConfigOverwrite: {
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false,
                }
            };
            if (!window.JitsiMeetExternalAPI) {
                const script = document.createElement('script');
                script.src = 'https://meet.jit.si/external_api.js';
                script.async = true;
                script.onload = () => {
                    new window.JitsiMeetExternalAPI(domain, { ...options, parentNode: container });
                };
                document.body.appendChild(script);
            } else {
                new window.JitsiMeetExternalAPI(domain, { ...options, parentNode: container });
            }
            document.getElementById('close-call').onclick = () => {
                modal.style.display = 'none';
                container.innerHTML = '';
            };
        }

        // --- NOTIFICATIONS ---
        function listenNotifications() {
            const q = query(collection(db, "notifications"), where("to", "==", currentUser.uid), orderBy("createdAt", "desc"), limit(20));
            unsubscribes['notifications'] = onSnapshot(q, snap => {
                let count = 0;
                snap.forEach(doc => { if (!doc.data().read) count++; });
                document.getElementById('notif-btn').dataset.count = count;
            });
        }

        async function addNotification(to, type, message) {
            await addDoc(collection(db, "notifications"), { to, from: currentUser.uid, type, message, read: false, createdAt: serverTimestamp() });
        }

            document.getElementById('menu-overlay').classList.add('show');

        document.getElementById('close-menu').onclick = () => {

            document.getElementById('menu-overlay').classList.remove('show');

            item.onclick = () => {
                const act = item.dataset.action;
                if (act === 'profile') navigateTo('profile');
                else if (act === 'edit-profile') {
                    document.getElementById('edit-modal').style.display = 'flex';
                    getDoc(doc(db, "users", currentUser.uid)).then(snap => {
                        const d = snap.data();
                        document.getElementById('edit-displayname').value = d.displayName || '';
                        document.getElementById('edit-username').value = d.username || '';
                        document.getElementById('edit-bio').value = d.bio || '';
                        document.getElementById('edit-location').value = d.location || '';
                    });
                } else if (act === 'saved') {
                    const container = document.getElementById('profile-content');
                    container.innerHTML = 'Đang tải...';
                    getDoc(doc(db, "users", currentUser.uid)).then(async snap => {
                        const savedIds = snap.data().saved || [];
                        if (savedIds.length === 0) {
                            container.innerHTML = '<div style="text-align:center;padding:20px;color:#888;">Bạn chưa lưu bài viết nào</div>';
                            return;
                        }
                        const grid = document.createElement('div');
                        grid.style.cssText = 'display:grid; grid-template-columns: 1fr 1fr 1fr; gap:3px;';
                        for (const id of savedIds) {
                            const postSnap = await getDoc(doc(db, "posts", id));
                            if (postSnap.exists()) {
                                const d = postSnap.data();
                                const el = document.createElement('img');
                                el.src = d.mediaUrls?.[0] || d.mediaUrl;
                                el.style.width = '100%'; el.style.aspectRatio = '1/1'; el.style.objectFit = 'cover';
                                el.onclick = () => alert(d.caption);
                                grid.appendChild(el);
                            }
                        }
                        container.innerHTML = '';
                        container.appendChild(grid);
                    });
                } else if (act === 'logout') {
                    if (confirm('Đăng xuất?')) {
                        signOut(auth);
                        showToast('Đã đăng xuất');
                    }
                }
                document.getElementById('side-menu').classList.remove('open');
                document.getElementById('menu-overlay').classList.remove('show');
            };
        });
    </script>
</body>
</html>
